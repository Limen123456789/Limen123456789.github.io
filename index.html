<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>离门团队视频</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
body {background:#000;color:#fff;font-family:"Microsoft YaHei",sans-serif;overflow:hidden}
.hidden {display:none !important}

.tab-bar {position:fixed;bottom:0;left:0;width:100%;height:50px;background:#111;display:flex;align-items:center;justify-content:space-around;z-index:9999;border-top:1px solid #333}
.tab-item {display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#999;cursor:pointer}
.tab-item.active {color:#fff}
.tab-plus {width:50px;height:50px;border-radius:50%;background:#070;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin-top:-10px;z-index:99999}

.video-page {width:100vw;height:calc(100vh - 50px);position:relative;overflow:hidden}
video {width:100%;height:100%;object-fit:cover;background:#000}
.top-bar {position:fixed;top:0;left:0;width:100%;height:50px;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:0 15px}
.upload-btn {position:fixed;top:60px;left:15px;z-index:9999;width:calc(100% - 30px);padding:12px;background:#070;color:#fff;border:none;border-radius:8px;font-size:18px;font-weight:bold}
.upload-progress {position:fixed;top:110px;left:15px;width:calc(100% - 30px);height:6px;background:#444;border-radius:3px;z-index:9999;display:none}
.upload-bar {height:100%;width:0%;background:#0f0;border-radius:3px}

.user-info {position:fixed;left:15px;bottom:80px;z-index:99999;display:flex;align-items:center;gap:12px}
.avatar {width:60px;height:60px;border-radius:50%;background:#fff;overflow:hidden;border:2px solid #fff;cursor:pointer}
.avatar img {width:100%;height:100%;object-fit:cover;display:block}
.user-name {font-size:20px;font-weight:bold;margin-bottom:8px}
.follow-btn {background:#ff4400;color:#fff;border:none;padding:8px 20px;border-radius:20px;font-size:16px;font-weight:bold;cursor:pointer}
.followed {background:#333;color:#fff}
.report-btn {background:#f00;color:#fff;border:none;padding:8px 16px;border-radius:16px;font-size:14px;margin-top:8px;cursor:pointer;z-index:999999;pointer-events:auto !important}
.right-bar {position:fixed;right:15px;bottom:80px;z-index:99999;display:flex;flex-direction:column;gap:20px;align-items:center}
.icon-btn {width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
.icon-count {font-size:12px;margin-top:4px}
.progress {position:fixed;bottom:20px;left:15px;width:calc(100% - 30px);height:6px;background:#444;border-radius:3px;z-index:9999;cursor:pointer}
.progress-bar {height:100%;width:0%;background:#0f0;border-radius:3px}

.my-page {position:fixed;inset:0;background:#fff;z-index:9999;display:none;overflow:auto;padding-bottom:50px;color:#000}
.my-header {height:150px;background:#f5f5f5;display:flex;align-items:center;padding:20px;gap:15px;position:relative}
.my-avatar {width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid #fff}
.my-avatar img {width:100%;height:100%;object-fit:cover}
.my-info {flex:1}
.my-name {font-size:22px;font-weight:bold;margin-bottom:8px}
.my-follow {display:flex;gap:20px;margin-top:10px}
.my-follow-item {text-align:center}
.my-follow-num {font-size:18px;font-weight:bold}
.my-follow-text {font-size:12px;color:#999}
.back-btn {position:absolute;top:15px;left:15px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;cursor:pointer}
.ban-tip-self {padding:15px 20px;background:#fff;border-bottom:1px solid #eee}
.ban-text {font-size:16px;color:#333;margin-bottom:10px}
.appeal-btn {background:#ff4400;color:#fff;border:none;padding:8px 15px;border-radius:20px;font-size:14px;cursor:pointer}
.my-list {padding:15px}
.my-item {display:flex;align-items:center;gap:15px;padding:15px 0;border-bottom:1px solid #eee;cursor:pointer}
.my-item-icon {width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:18px}
.my-item-text {flex:1;font-size:16px}

.user-page {position:fixed;inset:0;background:#fff;z-index:99999;display:none;overflow:auto;padding:20px;color:#000}
.user-head {height:160px;background:#111;color:#fff;display:flex;align-items:center;gap:14px;padding:14px;position:relative}
.user-av {width:70px;height:70px;border-radius:50%;overflow:hidden}
.user-back {position:absolute;top:14px;left:14px;color:#fff;cursor:pointer;font-size:20px}
.user-work {display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.user-work-item {aspect-ratio:9/16;background:#000;border-radius:8px;overflow:hidden}
.user-work-item video {width:100%;height:100%;object-fit:cover}

.ban-page {position:fixed;inset:0;background:#fff;z-index:99999;display:none;overflow:auto;color:#000}
.ban-header {height:150px;background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);position:relative}
.ban-avatar {width:120px;height:120px;border-radius:50%;background:#fff;position:absolute;bottom:-60px;left:20px;overflow:hidden;border:4px solid #fff}
.ban-avatar img {width:100%;height:100%;object-fit:cover}
.ban-follow {display:flex;gap:30px;position:absolute;bottom:-30px;left:160px}
.ban-follow-item {text-align:center}
.ban-follow-num {font-size:18px;font-weight:bold}
.ban-follow-text {font-size:14px;color:#333}
.ban-back {position:absolute;top:15px;left:15px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;cursor:pointer}
.ban-content {margin-top:70px;padding:20px}
.ban-status {font-size:18px;color:#333;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #eee}
.ban-warning {text-align:center;margin-top:50px}
.ban-warning-icon {width:100px;height:100px;border:3px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px}
.ban-warning-title {font-size:24px;font-weight:bold;margin-bottom:15px}
.ban-warning-desc {font-size:16px;color:#666;line-height:1.6}

.appeal-modal {position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999999;display:none;align-items:center;justify-content:center}
.appeal-card {background:#fff;width:90%;border-radius:12px;padding:20px;color:#000}
.appeal-title {font-size:18px;font-weight:bold;margin-bottom:15px;text-align:center}
.appeal-textarea {width:100%;height:120px;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:15px;resize:none}
.appeal-btn {width:100%;padding:12px;background:#ff4400;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;margin-bottom:10px}
.appeal-cancel {width:100%;padding:12px;background:#eee;color:#333;border:none;border-radius:8px;font-size:16px}

.msg-page {position:fixed;inset:0;background:#fff;z-index:9999;display:none;overflow:auto;padding-bottom:50px;color:#000}
.msg-header {height:50px;background:#f5f5f5;display:flex;align-items:center;justify-content:space-between;padding:0 15px;border-bottom:1px solid #eee}
.msg-list {height:calc(100vh - 50px);overflow:auto;padding:15px}
.msg-item {display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #eee;cursor:pointer}
.msg-avatar {width:40px;height:40px;border-radius:50%;background:#ddd;overflow:hidden}
.msg-avatar img {width:100%;height:100%;object-fit:cover}

.chat-page {position:fixed;inset:0;background:#fff;z-index:9999;display:none;padding-bottom:50px;color:#000}
.chat-header {height:50px;background:#f5f5f5;display:flex;align-items:center;justify-content:space-between;padding:0 15px;border-bottom:1px solid #eee}
.chat-list {height:calc(100vh - 100px);overflow:auto;padding:15px;margin-bottom:50px}
.chat-input {position:fixed;bottom:50px;left:0;width:100%;height:50px;background:#f5f5f5;display:flex;align-items:center;gap:10px;padding:0 15px;border-top:1px solid #eee;z-index:9999}
.chat-input input {flex:1;height:36px;padding:0 10px;border:1px solid #ddd;border-radius:18px}
.chat-input button {height:36px;padding:0 15px;background:#070;color:#fff;border:none;border-radius:18px}

.work-page {position:fixed;inset:0;background:#fff;z-index:9999;display:none;overflow:auto;padding-bottom:50px;color:#000}
.work-header {height:50px;background:#f5f5f5;display:flex;align-items:center;justify-content:space-between;padding:0 15px;border-bottom:1px solid #eee}
.work-list {height:calc(100vh - 50px);overflow:auto;padding:15px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.work-item {aspect-ratio:9/16;background:#f5f5f5;border-radius:8px;overflow:hidden;position:relative}
.work-item video {width:100%;height:100%;object-fit:cover}

.auth-page {position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center}
input, textarea {width:100%;padding:12px;margin:8px 0;background:#222;border:1px solid #0f0;color:#fff;border-radius:8px}
.btn {width:100%;padding:12px;background:#070;color:#fff;border:none;border-radius:8px;margin-top:8px;font-size:16px;font-weight:bold}
.btn-secondary {background:#333}
.btn-danger {background:#f00}

.comment-modal {position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99999;display:none;align-items:flex-end}
.comment-card {background:#111;width:100%;max-height:70vh;overflow:auto;padding:20px;border-radius:12px 12px 0 0;color:#fff}
.comment-list {max-height:40vh;overflow:auto;margin:15px 0}
.comment-item {padding:8px 0;border-bottom:1px solid #333}

.report-modal {position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:99999999 !important;display:none;align-items:center;justify-content:center;pointer-events:auto !important}
.report-card {background:#111;border:2px solid #0f0;padding:20px;width:90%;border-radius:12px;color:#fff;pointer-events:auto !important}
.report-card button {padding:10px;margin:5px 0;border-radius:8px;cursor:pointer;pointer-events:auto !important}

.share-modal {position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99999;display:none;align-items:center;justify-content:center}
.share-card {background:#111;padding:20px;border-radius:12px;color:#fff}

.admin-login-modal {position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99999999;display:none;align-items:center;justify-content:center}
.admin-login-card {background:#111;border:2px solid #0f0;padding:20px;width:90%;border-radius:12px;color:#fff}

.admin-modal {position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999999;display:none;align-items:center;justify-content:center}
.admin-card {background:#111;border:2px solid #f00;padding:20px;width:95%;max-height:90vh;overflow:auto;border-radius:12px;color:#fff}

.refresh-tip{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  background:#0f0;color:#000;padding:6px 12px;border-radius:20px;font-size:12px;z-index:99999;display:none
}
</style>
</head>
<body>

<div class="refresh-tip" id="refreshTip">下拉刷新成功</div>

<div class="top-bar">
  <span onclick="openMyPage()">我</span>
  <span>离门团队视频</span>
  <span onclick="openAdmin()">管理</span>
</div>

<div class="video-page hidden" id="videoPage">
  <video id="mainVideo" playsinline preload="auto" muted></video>
  <div class="user-info">
    <div class="avatar" id="userAvatar" onclick="openMyPage()"><img src=""></div>
    <div>
      <div class="user-name" id="userName"></div>
      <button class="follow-btn" id="followBtn" onclick="toggleFollow()">关注</button>
      <button class="report-btn" onclick="openReport(currentUser)" ontouchstart="openReport(currentUser)">举报</button>
    </div>
  </div>
  <div class="right-bar">
    <div class="icon-btn" onclick="toggleLike()">❤️</div>
    <div class="icon-count" id="likeCount">2319</div>
    <div class="icon-btn" onclick="openComment()">💬</div>
    <div class="icon-count" id="commentCount">3257</div>
    <div class="icon-btn" onclick="toggleCollect()">⭐</div>
    <div class="icon-count" id="collectCount">332</div>
    <div class="icon-btn" onclick="openShare()">📤</div>
    <div class="icon-count">259</div>
  </div>
  <div class="progress" id="progressBarWrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<button class="upload-btn" onclick="document.getElementById('uploadVideo').click()">📤 上传视频</button>
<div class="upload-progress" id="uploadProgress"><div class="upload-bar" id="uploadBar"></div></div>

<div class="auth-page" id="authPage">
  <div class="report-card">
    <h2 style="text-align:center">离门团队视频-登录/注册</h2>
    <input id="regUser" placeholder="账号">
    <input id="regPwd" type="password" placeholder="密码">
    <input type="file" id="regAvatar" accept="image/*">
    <button class="btn" onclick="doRegister()">注册</button>
    <button class="btn btn-secondary" onclick="doLogin()">登录</button>
  </div>
</div>

<div class="my-page" id="myPage">
  <div class="my-header">
    <div class="back-btn" onclick="switchTab('home')">←</div>
    <div class="my-avatar"><img id="myAvatar" src=""></div>
    <div class="my-info">
      <div class="my-name" id="myName"></div>
      <div class="my-follow">
        <div class="my-follow-item"><div class="my-follow-num" id="fansNum">0</div><div class="my-follow-text">粉丝</div></div>
        <div class="my-follow-item"><div class="my-follow-num" id="followNum">0</div><div class="my-follow-text">关注</div></div>
        <div class="my-follow-item"><div class="my-follow-num" id="likeNum">0</div><div class="my-follow-text">获赞</div></div>
      </div>
    </div>
  </div>
  <div class="ban-tip-self" id="banTipSelf">
    <div class="ban-text" id="banText">该账户已被封禁</div>
    <button class="appeal-btn" onclick="openAppeal()">我要申诉</button>
  </div>
  <div class="my-list">
    <div class="my-item" onclick="openWorkPage()"><div class="my-item-icon">📹</div><div class="my-item-text">我的作品</div></div>
    <div class="my-item" onclick="openMsgPage()"><div class="my-item-icon">📩</div><div class="my-item-text">我的消息</div></div>
    <div class="my-item" onclick="openAdmin()"><div class="my-item-icon">🔐</div><div class="my-item-text">管理后台</div></div>
  </div>
</div>

<div class="user-page" id="userPage">
  <div class="user-head">
    <div class="user-back" onclick="closeUserPage()">←</div>
    <div class="user-av"><img id="targetAv" src=""></div>
    <div>
      <div style="font-size:18px" id="targetName"></div>
      <button class="report-btn" onclick="openReport(document.getElementById('targetName').textContent)" ontouchstart="openReport(document.getElementById('targetName').textContent)">举报该用户</button>
    </div>
  </div>
  <div class="user-work" id="targetWork"></div>
</div>

<div class="ban-page" id="banPage">
  <div class="ban-header">
    <div class="ban-back" onclick="closeBanPage()">←</div>
    <div class="ban-avatar"><img src=""></div>
  </div>
  <div class="ban-content">
    <div class="ban-status">账号已被封禁</div>
    <div class="ban-warning">
      <div class="ban-warning-icon">⚠️</div>
      <div class="ban-warning-title">账号已被封禁</div>
      <div class="ban-warning-desc">由于违反社区规范，该账号已被永久封禁</div>
    </div>
  </div>
</div>

<div class="appeal-modal" id="appealModal">
  <div class="appeal-card">
    <div class="appeal-title">账号申诉</div>
    <textarea class="appeal-textarea" id="appealReason" placeholder="请填写申诉理由"></textarea>
    <button class="appeal-btn" onclick="submitAppeal()">提交申诉</button>
    <button class="appeal-cancel" onclick="closeAppeal()">取消</button>
  </div>
</div>

<div class="msg-page" id="msgPage">
  <div class="msg-header"><span>消息</span><span onclick="closeMsgPage()">返回</span></div>
  <div class="msg-list">
    <div class="msg-item" onclick="openChat('离门团队违规申诉客服')">
      <div class="msg-avatar"><img src="https://via.placeholder.com/40"></div>
      <span>离门团队违规申诉客服</span>
    </div>
    <div class="msg-item" onclick="openChat('好友')">
      <div class="msg-avatar"><img src="https://via.placeholder.com/40"></div>
      <span>好友</span>
    </div>
  </div>
</div>

<div class="chat-page" id="chatPage">
  <div class="chat-header"><span id="chatName"></span><span onclick="closeChatPage()">返回</span></div>
  <div class="chat-list" id="chatList"></div>
  <div class="chat-input">
    <input id="chatInput" placeholder="发送消息">
    <button onclick="sendChat()">发送</button>
  </div>
</div>

<div class="work-page" id="workPage">
  <div class="work-header"><span>我的作品</span><span onclick="closeWorkPage()">返回</span></div>
  <div class="work-list" id="workList"></div>
  <input type="file" accept="video/*" onchange="uploadWork(event)">
</div>

<div class="comment-modal" id="commentModal">
  <div class="comment-card">
    <div style="display:flex;justify-content:space-between">
      <span>评论区</span><span onclick="closeComment()">×</span>
    </div>
    <div class="comment-list" id="commentList"></div>
    <input id="commentInput" placeholder="发送评论">
    <button onclick="sendComment()">发送</button>
  </div>
</div>

<div class="report-modal hidden" id="reportModal">
  <div class="report-card">
    <h3>专属举报通道</h3>
    <input id="reportTarget" placeholder="被举报用户账号" readonly>
    <select id="reportType">
      <option>用户作品违规</option>
      <option>私信骚扰</option>
      <option>辱骂人身攻击</option>
    </select>
    <textarea id="reportMsg" placeholder="补充说明"></textarea>
    <button class="btn" onclick="submitReport()" ontouchstart="submitReport()">提交举报</button>
    <button class="btn btn-secondary" onclick="closeReport()" ontouchstart="closeReport()">取消</button>
  </div>
</div>

<div class="share-modal hidden" id="shareModal">
  <div class="share-card">
    <h3>分享</h3>
    <div onclick="closeShare()">关闭</div>
    <div>复制链接</div>
    <div>分享微信</div>
  </div>
</div>

<div class="admin-login-modal" id="adminLoginModal">
  <div class="admin-login-card">
    <h3>管理员验证</h3>
    <input id="adminPwd" type="password" placeholder="请输入管理员密码">
    <button class="btn" onclick="checkAdminPwd()">确认登录</button>
    <button class="btn btn-secondary" onclick="closeAdminLogin()">取消</button>
  </div>
</div>

<div class="admin-modal" id="adminModal">
  <div class="admin-card">
    <h3>总管理后台</h3>
    <button onclick="showReports()">查看所有举报</button>
    <button onclick="showWorks()">查看所有作品</button>
    <button onclick="showChatLog()">查看私信记录</button>
    <button onclick="showAppeals()">查看申诉记录</button>
    <button onclick="showAppealHandle()">申诉审核</button>
    <button onclick="clearAll()">清空所有数据</button>
    <button class="btn-secondary" onclick="closeAdmin()">关闭后台</button>
    <div id="adminContent"></div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tabHome" onclick="switchTab('home')">精选</div>
  <div class="tab-item tab-plus" onclick="document.getElementById('uploadVideo').click()">+</div>
  <div class="tab-item" id="tabMsg" onclick="switchTab('msg')">消息</div>
  <div class="tab-item" id="tabMy" onclick="switchTab('my')">我</div>
</div>

<input type="file" hidden id="uploadVideo" accept="video/*" onchange="uploadVideo(event)">

<script>
let currentUser = null
let works = JSON.parse(localStorage.getItem("works") || "[]")
let comments = JSON.parse(localStorage.getItem("comments") || "[]")
let reports = JSON.parse(localStorage.getItem("reports") || "[]")
let chats = JSON.parse(localStorage.getItem("chats") || "[]")
let appeals = JSON.parse(localStorage.getItem("appeals") || "[]")
let users = JSON.parse(localStorage.getItem("users")||"[]")
let bans = JSON.parse(localStorage.getItem("bans")||"[]")
let followStatus = false
let likeStatus = false
let collectStatus = false
let sensitiveWords = ["违规","违法","色情","暴力","脏话"]
let currentVideo = document.getElementById("mainVideo")
let progressBar = document.getElementById("progressBar")
let currentReportUser = null

// 已改成你要的密码：1234567890
const ADMIN_PASSWORD = "1234567890";

document.addEventListener('touchstart',(e)=>{
  startY = e.touches[0].clientY
})
document.addEventListener('touchend',(e)=>{
  let endY = e.changedTouches[0].clientY
  if(endY - startY > 80){
    document.getElementById("refreshTip").style.display = "block"
    setTimeout(()=>location.reload(),600)
    setTimeout(()=>document.getElementById("refreshTip").style.display = "none",1500)
  }
})

function switchTab(tab) {
  document.querySelectorAll(".tab-item").forEach(item => item.classList.remove("active"))
  document.getElementById("videoPage").classList.add("hidden")
  document.getElementById("msgPage").style.display = "none"
  document.getElementById("myPage").style.display = "none"
  document.getElementById("banPage").style.display = "none"
  document.getElementById("userPage").style.display = "none"
  if(tab === "home") {
    document.getElementById("tabHome").classList.add("active")
    document.getElementById("videoPage").classList.remove("hidden")
  } else if(tab === "msg") {
    document.getElementById("tabMsg").classList.add("active")
    document.getElementById("msgPage").style.display = "block"
  } else if(tab === "my") {

function playVideo(url){
  currentVideo.src = url

function uploadVideo(e) {
  let file = e.target.files[0];if(!file) return
  let reader = new FileReader()
  let progress = document.getElementById("uploadProgress")
  let bar = document.getElementById("uploadBar")
  progress.style.display = "block"
  reader.onprogress = (e)=>{
    if(e.lengthComputable){
      let per = (e.loaded/e.total)*100
      bar.style.width = per + "%"
    }
  }
  reader.onload = function(e){
    let base64 = e.target.result
    let now = new Date()
    let publishTime = now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate()+" "+now.getHours()+":"+now.getMinutes()+":"+now.getSeconds()
    currentVideo.src = base64
    currentVideo.play()
    works.push({ 
      url: base64, 
      user: currentUser, 
      time: new Date().toLocaleString(),
      publishTime: publishTime
    })
    localStorage.setItem("works", JSON.stringify(works))
    updateMyPage()
    setTimeout(()=>{ progress.style.display = "none" },500)
  }
  reader.readAsDataURL(file)
}

function initVideoProgress() {
  currentVideo.ontimeupdate = () => {
    if(!currentVideo.duration) return
    let per = (currentVideo.currentTime/currentVideo.duration)*100
    progressBar.style.width = per + "%"
  }
  document.getElementById("progressBarWrap").onclick = (e) => {
    if(!currentVideo.src || !currentVideo.duration) return
    let rect = e.currentTarget.getBoundingClientRect()
    let x = e.clientX - rect.left
    let per = x/rect.width
    currentVideo.currentTime = currentVideo.duration*per
  }
  currentVideo.onclick = () => {
    currentVideo.paused ? currentVideo.play() : currentVideo.pause()
  }
}

function doRegister() {
  let user = document.getElementById("regUser").value.trim()
  let pwd = document.getElementById("regPwd").value.trim()
  
  if(!user || !pwd) {
    alert("账号和密码都不能为空！")
    return
  }

  let exist = users.find(x => x.user == user)
  if(exist) {
    alert("该账号已注册，请直接登录！")
    return
  }

  let obj={user,pwd,ip:"本地",time:new Date().toLocaleString()}
  users.push(obj)
  localStorage.setItem("users",JSON.stringify(users))
  
  currentUser = user
  localStorage.setItem("user", user)
  localStorage.setItem("pwd", pwd)
  
  alert("注册成功！已自动登录")
  
  document.getElementById("authPage").style.display = "none"
  document.getElementById("videoPage").classList.remove("hidden")
  document.getElementById("userName").textContent = user

function doLogin() {
  let user = document.getElementById("regUser").value.trim()
  let pwd = document.getElementById("regPwd").value.trim()
  
  let u=users.find(x=>x.user==user&&x.pwd==pwd)
  if(!u) {
    alert("账号或密码错误")
    return
  }
  
  currentUser = user
  localStorage.setItem("user", user)
  localStorage.setItem("pwd", pwd)
  
  document.getElementById("authPage").style.display = "none"
  document.getElementById("videoPage").classList.remove("hidden")
  
  let avatar = localStorage.getItem("avatar")
  if(avatar) {

  document.getElementById("myName").textContent = user

function openReport(targetUser) {
  if(!currentUser) {
    alert("请先登录才能举报")
    return
  }
  if(!targetUser) {
    alert("无法获取被举报用户")
    return
  }
  currentReportUser = targetUser
  document.getElementById("reportTarget").value = targetUser
  document.getElementById("reportModal").classList.remove("hidden")
  document.getElementById("reportModal").style.display = "flex"
}
function closeReport() {
  document.getElementById("reportModal").classList.add("hidden")
  document.getElementById("reportModal").style.display = "none"
  currentReportUser = null
}
function submitReport() {
  if(!currentUser) {
    alert("请先登录才能举报")
    return
  }
  let type = document.getElementById("reportType").value
  let msg = document.getElementById("reportMsg").value
  let target = document.getElementById("reportTarget").value.trim()
  
  if(!target) {
    alert("被举报用户不能为空！")
    return
  }
  
  reports.push({
    type,
    target: target,
    msg,
    user: currentUser,
    time: new Date().toLocaleString()
  })
  localStorage.setItem("reports",JSON.stringify(reports))
  alert("举报成功")
  closeReport()
}

function showReports() {
  let html="<h3>举报记录（通过即封禁）</h3>"
  reports.forEach((it,i)=>{
    html+=`<div style='border:1px solid #333;padding:10px;margin:6px'>
      举报人：${it.user} <br>
      被举报：${it.target} <br>
      举报时间：${it.time} <br>
      <button onclick='passReport(${i})'>通过举报并封禁</button>
      <button onclick='delReport(${i})'>删除</button>
    </div>`
  })
  document.getElementById("adminContent").innerHTML=html
}

function passReport(i){
  let r = reports[i]
  let targetUser = r.target
  let now = new Date()
  let passTime = now.toLocaleString()
  let unlockTime = new Date(now.getTime() + 3*24*60*60*1000).toLocaleString()
  
  if(!bans.some(x=>x.user==targetUser)){
    bans.push({
      user: targetUser,
      reportTime: r.time,
      passTime: passTime,
      unlockTime: unlockTime
    })
    localStorage.setItem("bans",JSON.stringify(bans))
  }
  reports.splice(i,1)
  localStorage.setItem("reports",JSON.stringify(reports))
  alert("举报已通过，用户已封禁！")
  showReports()
}

function updateBanStatus(){
  if(!currentUser) return
  let banInfo = bans.find(b=>b.user==currentUser)
  if(!banInfo){
    document.getElementById("banTipSelf").style.display = "none"
    return
  }
  document.getElementById("banTipSelf").style.display = "block"
  document.getElementById("banText").innerHTML = 
  "您的账户被封禁<br>举报时间："+(banInfo.reportTime||"无")+
  "<br>封禁通过时间："+(banInfo.passTime||"无")+
  "<br>解封时间："+(banInfo.unlockTime||"永久")
}
