<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>离门团队视频</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:"Microsoft YaHei",sans-serif;overflow:hidden}
.hidden{display:none !important}

.top-bar{position:fixed;top:0;left:0;width:100%;height:46px;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.time-text{font-size:13px;color:#fff}

.tab-bar{position:fixed;bottom:0;left:0;width:100%;height:50px;background:#111;display:flex;align-items:center;justify-content:space-around;z-index:9999;border-top:1px solid #333}
.tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#999;cursor:pointer}
.tab-item.active{color:#fff}
.tab-plus{width:50px;height:50px;border-radius:50%;background:#070;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin-top:-10px}

.video-page{width:100vw;height:calc(100vh - 50px);position:relative}
video{width:100%;height:100%;object-fit:cover}

.video-info{position:absolute;left:14px;bottom:80px;z-index:10}
.username{font-size:16px;font-weight:bold;margin-bottom:6px}
.avatar{width:40px;height:40px;border-radius:50%;background:#070;display:flex;align-items:center;justify-content:center;margin-bottom:8px}

.right-bar{position:absolute;right:14px;bottom:80px;display:flex;flex-direction:column;gap:18px;z-index:10}
.icon-btn{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:18px}

.auth-page{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;padding:20px;z-index:99999}
.auth-card{width:100%;max-width:360px;background:#111;padding:24px;border-radius:16px}
input{width:100%;padding:12px;margin:8px 0;background:#222;border:1px solid #0f0;color:#fff;border-radius:8px}
button{width:100%;padding:12px;margin:6px 0;background:#070;color:#fff;border:0;border-radius:8px;font-size:16px;cursor:pointer}
.sec-btn{background:#333}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}
.modal-content{background:#111;padding:20px;border-radius:12px;width:90%;max-width:350px}

.page{position:fixed;inset:0;background:#000;padding:20px;padding-top:60px;padding-bottom:60px;overflow:auto;z-index:100}
.me-card{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.me-avatar{width:60px;height:60px;border-radius:50%;background:#070}
.title{font-size:18px;margin-bottom:14px}
.item{padding:12px;background:#111;margin:6px 0;border-radius:8px}

.progress{position:absolute;bottom:60px;left:0;width:100%;height:4px;background:#333}
.bar{height:100%;width:0%;background:#0f0}

.comment-box{position:fixed;bottom:0;left:0;width:100%;background:#111;padding:14px;z-index:1000}
.comment-input{width:80%;padding:10px;background:#222;border:0;color:#fff;border-radius:8px}
.send-btn{width:18%;padding:10px;background:#070;color:#fff;border:0;border-radius:8px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="time-text" id="topTime"></div>
  <div>离门团队视频</div>
  <div onclick="openAdmin()" style="cursor:pointer">管理</div>
</div>

<div class="video-page" id="videoPage">
  <video id="mainVideo" controls></video>
  <div class="progress"><div class="bar" id="progressBar"></div></div>
  <div class="video-info">
    <div class="avatar">头</div>
    <div class="username" id="videoUser">用户</div>
  </div>
  <div class="right-bar">
    <div class="icon-btn" onclick="doLike()">❤️</div>
    <div class="icon-btn" onclick="doFollow()">关注</div>
    <div class="icon-btn" onclick="openComment()">评论</div>
    <div class="icon-btn" onclick="openReport()">举报</div>
  </div>
</div>

<div class="auth-page" id="authPage">
  <div class="auth-card">
    <h3 style="text-align:center;margin-bottom:16px">登录 / 注册</h3>
    <input id="userInput" placeholder="输入账号">
    <input id="pwdInput" type="password" placeholder="输入密码">
    <button onclick="doRegister()">注册</button>
    <button onclick="doLogin()" class="sec-btn">登录</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active" onclick="goPage('video')">首页</div>
  <div class="tab-item" onclick="goPage('upload')">发布</div>
  <div class="tab-plus" onclick="goPage('upload')">+</div>
  <div class="tab-item" onclick="goPage('msg')">消息</div>
  <div class="tab-item" onclick="goPage('me')">我的</div>
</div>

<div class="page hidden" id="uploadPage">
  <div class="title">发布视频</div>
  <input type="file" id="videoFile" accept="video/*">
  <button onclick="uploadVideo()">发布</button>
</div>

<div class="page hidden" id="mePage">
  <div class="me-card">
    <div class="me-avatar"></div>
    <div>
      <div id="meName">用户</div>
      <div style="font-size:12px;color:#999">我的作品</div>
    </div>
  </div>
  <div id="myVideos"></div>
  <button onclick="openAppeal()">申诉</button>
</div>

<div class="page hidden" id="msgPage">
  <div class="title">消息</div>
  <div style="font-size:12px;color:#0f0">欢迎使用离门团队视频</div>
  <div id="chatList"></div>
  <input id="chatInput" placeholder="发私信">
  <button onclick="sendMsg()">发送</button>
</div>

<div class="modal" id="reportModal">
  <div class="modal-content">
    <div class="title">举报</div>
    <select id="reportType">
      <option>作品违规</option>
      <option>私信违规</option>
      <option>用户不良</option>
    </select>
    <button onclick="submitReport()">提交举报</button>
  </div>
</div>

<div class="modal" id="adminModal">
  <div class="modal-content">
    <div class="title">管理员后台</div>
    <input id="adminPwd" type="password" placeholder="密码">
    <button onclick="checkAdmin()">登录</button>
    <div id="adminPanel" class="hidden">
      <button onclick="banUser()">封禁用户</button>
      <button onclick="unbanUser()">解封</button>
      <button onclick="handleAppeal(true)">申诉通过</button>
      <button onclick="handleAppeal(false)">申诉拒绝</button>
      <div id="banTime"></div>
    </div>
  </div>
</div>

<div class="comment-box hidden" id="commentBox">
  <input class="comment-input" id="commentText" placeholder="写评论">
  <button class="send-btn" onclick="sendComment()">发送</button>
</div>

<script>
const ADMIN_PWD = "1234567890";
let currentUser = null;
let videos = JSON.parse(localStorage.getItem("videos")||"[]");
let users = JSON.parse(localStorage.getItem("users")||"{}");
let reports = JSON.parse(localStorage.getItem("reports")||"[]");
let appeals = JSON.parse(localStorage.getItem("appeals")||"[]");
let likes = JSON.parse(localStorage.getItem("likes")||"{}");
let follows = JSON.parse(localStorage.getItem("follows")||"{}");
let comments = JSON.parse(localStorage.getItem("comments")||"{}");
let msgs = JSON.parse(localStorage.getItem("msgs")||"[]");

function updateTime(){
  let d = new Date();
  document.getElementById("topTime").innerText = d.toLocaleString();
}
setInterval(updateTime,1000); updateTime();

function doRegister(){
  let u = document.getElementById("userInput").value.trim();
  let p = document.getElementById("pwdInput").value.trim();
  if(!u||!p)return alert("不能为空");
  if(users[u])return alert("已存在");
  users[u]=p;
  localStorage.setItem("users",JSON.stringify(users));
  alert("注册成功");
}

function doLogin(){
  let u = document.getElementById("userInput").value.trim();
  let p = document.getElementById("pwdInput").value.trim();
  if(!u||!p)return alert("请输入");
  if(users[u]!==p)return alert("错误");
  currentUser=u;
  localStorage.setItem("currentUser",currentUser);
  document.getElementById("authPage").classList.add("hidden");
  document.getElementById("videoPage").classList.remove("hidden");
  document.getElementById("meName").innerText=currentUser;
  loadVideo();
}

function goPage(p){
  if(!currentUser)return alert("请登录");
  document.querySelectorAll(".page,.video-page").forEach(i=>i.classList.add("hidden"));
  if(p==="video")document.getElementById("videoPage").classList.remove("hidden");
  if(p==="upload")document.getElementById("uploadPage").classList.remove("hidden");
  if(p==="me"){document.getElementById("mePage").classList.remove("hidden");loadMyVideos();}
  if(p==="msg")document.getElementById("msgPage").classList.remove("hidden");
}

function uploadVideo(){
  let f = document.getElementById("videoFile").files[0];
  if(!f)return alert("选视频");
  let url = URL.createObjectURL(f);
  videos.unshift({user:currentUser,url:url,time:new Date().toLocaleString()});
  localStorage.setItem("videos",JSON.stringify(videos));
  alert("发布成功");
  loadVideo();
}

function loadVideo(){
  if(videos.length===0)return;
  let v = document.getElementById("mainVideo");
  v.src = videos[0].url;
  document.getElementById("videoUser").innerText = videos[0].user;
  v.play();
}

function doLike(){
  if(!videos[0])return;
  let k = videos[0].user+"_0";
  likes[k]=(likes[k]||0)+1;
  localStorage.setItem("likes",JSON.stringify(likes));
}

function doFollow(){
  follows[currentUser] = videos[0].user;
  localStorage.setItem("follows",JSON.stringify(follows));
  alert("已关注");
}

function openComment(){document.getElementById("commentBox").classList.remove("hidden");}
function sendComment(){
  let t = document.getElementById("commentText").value.trim();
  if(!t)return;
  comments[videos[0].user] = comments[videos[0].user]||[];
  comments[videos[0].user].push({user:currentUser,text:t});
  localStorage.setItem("comments",JSON.stringify(comments));
  alert("评论成功");
}

function openReport(){document.getElementById("reportModal").style.display="flex";}
function submitReport(){
  let t = document.getElementById("reportType").value;
  reports.push({from:currentUser,type:t,target:videos[0].user,time:new Date().toLocaleString()});
  localStorage.setItem("reports",JSON.stringify(reports));
  alert("举报成功");
  document.getElementById("reportModal").style.display="none";
}

function openAppeal(){
  appeals.push({user:currentUser,time:new Date().toLocaleString()});
  localStorage.setItem("appeals",JSON.stringify(appeals));
  alert("已提交申诉");
}

function openAdmin(){document.getElementById("adminModal").style.display="flex";}
function checkAdmin(){
  if(document.getElementById("adminPwd").value===ADMIN_PWD){
    document.getElementById("adminPanel").classList.remove("hidden");
  }else alert("密码错误");
}
function banUser(){
  let t = prompt("输入要封禁的用户");
  if(!t)return;
  localStorage.setItem("ban_"+t,new Date().getTime()+86400000);
  alert("已封禁24小时");
}
function unbanUser(){
  let t = prompt("输入用户");
  localStorage.removeItem("ban_"+t);
  alert("已解封");
}
function handleAppeal(ok){
  appeals=[];
  localStorage.setItem("appeals",JSON.stringify(appeals));
  alert(ok?"申诉通过":"申诉拒绝");
}

function loadMyVideos(){
  let list = videos.filter(v=>v.user===currentUser);
  let html="";
  list.forEach((v,i)=>{html+=`<div class="item" onclick="playVideo(${i})">作品${i+1}</div>`;});
  document.getElementById("myVideos").innerHTML=html;
}
function playVideo(i){
  document.getElementById("mainVideo").src=videos[i].url;
  goPage('video');
}

function sendMsg(){
  let t = document.getElementById("chatInput").value.trim();
  if(!t)return;
  msgs.push({from:currentUser,text:t,time:new Date().toLocaleString()});
  localStorage.setItem("msgs",JSON.stringify(msgs));
  document.getElementById("chatInput").value="";
}

window.onload=function(){
  let u=localStorage.getItem("currentUser");
  if(u){currentUser=u;document.getElementById("authPage").classList.add("hidden");document.getElementById("meName").innerText=u;loadVideo();}
};

document.addEventListener('touchstart',e=>{window.sy=e.touches[0].clientY;});
document.addEventListener('touchend',e=>{
  let ey=e.changedTouches[0].clientY;
  if(ey-window.sy>50)prevVideo();
  else if(window.sy-ey>50)nextVideo();
});
function nextVideo(){
  videos.push(videos.shift());
  loadVideo();
}
function prevVideo(){
  videos.unshift(videos.pop());
  loadVideo();
}

let v=document.getElementById("mainVideo");
v.ontimeupdate=()=>{document.getElementById("progressBar").style.width=(v.currentTime/v.duration)*100+"%";};
</script>
</body>
</html>
