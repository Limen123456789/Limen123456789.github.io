<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>离门团队视频</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff;overflow:hidden}
.page{position:fixed;top:0;left:0;width:100%;height:100%;display:none}
.page.show{display:block}
/* 封禁提示栏样式 */
.ban-tip{position:fixed;top:0;left:0;width:100%;background:#ff0000;color:#fff;padding:10px;text-align:center;font-weight:bold;z-index:9999;display:none}
.nav{position:fixed;bottom:0;left:0;width:100%;height:55px;background:#000;display:flex;align-items:center;justify-content:space-around;border-top:1px solid #222;z-index:999}
.nav .item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12px;color:#888}
.nav .item.active{color:#fff}
.nav .add{width:50px;height:50px;border-radius:50%;background:#ff4500;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin-top:-15px}
.profile-page{height:100%;overflow:auto;padding:50px 0 70px 0;background:#000}
.profile-header{padding:20px;display:flex;align-items:center;gap:15px;border-bottom:1px solid #222}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:bold;overflow:hidden;position:relative}
.profile-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.profile-avatar .placeholder{position:absolute;top:0;left:0;width:100%;height:100%;background:#333;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff}
.profile-info{flex:1}
.profile-username{font-size:20px;font-weight:bold;margin-bottom:8px}
.profile-stats{display:flex;gap:20px;margin-bottom:15px}
.profile-stat{display:flex;flex-direction:column;align-items:center}
.profile-stat-num{font-size:18px;font-weight:bold}
.profile-stat-text{font-size:12px;color:#888}
.profile-btns{display:flex;flex-direction:column;gap:10px}
.profile-btn{padding:15px 20px;border-radius:8px;font-size:18px;border:none;width:100%}
.profile-btn.primary{background:#ff4500;color:#fff}
.profile-btn.secondary{background:#1a1a1a;color:#fff;border:1px solid #333}
#appealBtn{display:block;margin-top:10px}
.profile-videos{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;min-height:200px}
.profile-video-item{aspect-ratio:9/16;background:#1a1a1a;position:relative;overflow:hidden;cursor:pointer}
.profile-video-item video{width:100%;height:100%;object-fit:cover}
.empty-state{padding:50px;text-align:center;color:#888;font-size:16px}
.login-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px;height:100%}
.login-box input{width:85%;padding:12px;border-radius:8px;background:#111;border:1px solid #333;color:#fff}
.login-box button{width:85%;padding:12px;border-radius:8px;background:#ff4500;color:#fff;border:0}
.video-box{width:100%;height:100%;background:#000;overflow:auto;padding:50px 0 70px 0}
video{width:100%;height:auto;display:block}
.item{border:1px solid #222;padding:10px;margin:10px 0;border-radius:8px}
.comment{background:#111;padding:8px;margin:4px 0;border-radius:6px}
input,button,input[type="file"]{width:100%;margin:6px 0;padding:10px;border-radius:8px}
input{background:#111;border:1px solid #333;color:#fff}
button{background:#ff4500;color:#fff;border:0}
input[type="file"]{color:#fff;display:block;background:#1a1a1a;border:1px solid #333}
</style>
</head>
<body>
<!-- 封禁提示栏 -->
<div class="ban-tip" id="banTip">⚠️ 您的账号已被封禁，部分功能受限，请提交申诉</div>

<div class="page show" id="loginPage">
  <div class="login-box">
    <h2>离门团队视频</h2>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
    <button onclick="reg()">注册</button>
    <button onclick="go('adminPage')">管理员后台</button>
  </div>
</div>

<div class="page" id="homePage">
  <div class="video-box" id="videoList"></div>
  <div class="nav">
    <div class="item active" onclick="go('homePage')"><div>🏠</div><div>首页</div></div>
    <div class="item" onclick="go('msgPage')"><div>💬</div><div>消息</div></div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')"><div>👤</div><div>我</div></div>
  </div>
</div>

<div class="page" id="msgPage">
  <div class="video-box">
    <h3>私信</h3>
    <input id="toUser" placeholder="对方账号">
    <input id="msgText" placeholder="消息内容">
    <button onclick="sendMsg()">发送</button>
    <div id="msgList"></div>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item active" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<div class="page" id="uploadPage">
  <div class="video-box">
    <h3>发布视频</h3>
    <input type="file" id="vfile" accept="video/*">
    <input id="vtitle" placeholder="视频描述">
    <button onclick="upload()">发布</button>
    <button onclick="go('homePage')">返回</button>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add active" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<div class="page" id="mePage">
  <div class="profile-page">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar"><div class="placeholder" id="avatarPlaceholder">U</div><img id="avatarImg" style="display:none"></div>
      <div class="profile-info">
        <div class="profile-username" id="profileUsername">用户名</div>
        <div class="profile-stats">
          <div class="profile-stat"><span class="profile-stat-num" id="statVideos">0</span><span class="profile-stat-text">作品</span></div>
          <div class="profile-stat"><span class="profile-stat-num" id="statFollow">0</span><span class="profile-stat-text">关注</span></div>
          <div class="profile-stat"><span class="profile-stat-num" id="statFans">0</span><span class="profile-stat-text">粉丝</span></div>
        </div>
        <div class="profile-btns">
          <input type="file" id="avatarFile" accept="image/*">
          <button class="profile-btn primary" onclick="document.getElementById('avatarFile').click()">上传头像</button>
          <button class="profile-btn primary" id="appealBtn" onclick="go('appealPage')">账号申诉</button>
          <button class="profile-btn secondary" onclick="logout()">退出登录</button>
        </div>
      </div>
    </div>
    <div class="profile-videos" id="myVideos"></div>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')"><div>🏠</div><div>首页</div></div>
    <div class="item" onclick="go('msgPage')"><div>💬</div><div>消息</div></div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item active" onclick="go('mePage')"><div>👤</div><div>我</div></div>
  </div>
</div>

<div class="page" id="appealPage">
  <div class="video-box">
    <h3>账号申诉</h3>
    <input id="appealText" placeholder="申诉理由">
    <button onclick="sendAppeal()">提交</button>
    <button onclick="go('mePage')">返回</button>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item active" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<div class="page" id="adminPage">
  <div class="video-box">
    <h3>管理员后台</h3>
    <input id="adminPwd" type="password" placeholder="密码">
    <button onclick="adminLogin()">登录</button>
    <input id="banUid" placeholder="封禁用户ID">
    <button onclick="banUser()">封禁</button>
    <input id="unbanUid" placeholder="解封用户ID">
    <button onclick="unbanUser()">解封</button>
    <button onclick="showReports()">查看举报</button>
    <button onclick="showAppeals()">查看申诉</button>
    <button onclick="go('loginPage')">返回</button>
    <div id="reportList"></div>
    <div id="appealList"></div>
  </div>
  <div class="nav">
    <div class="item" onclick="go('loginPage')">🏠<div>首页</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient("https://melgyktzmzyednqtmqfz.supabase.co","sb_publishable_iS4ChZxw5ixbg7S-y-Vddw_YQZ6SHMV");
let user=null;
const ADMIN_PWD="1234567890";
let videosCache=[];
const banTip=document.getElementById('banTip');

// 检查账号封禁状态
function checkBanStatus(){
  if(!user)return;
  if(user.status==='封禁'){
    banTip.style.display='block';
    document.querySelectorAll('.profile-btn.primary:not(#appealBtn), .add, #uploadPage button, #msgPage button, #homePage button').forEach(btn=>{
      btn.disabled=true;
      btn.style.opacity='0.5';
      btn.style.cursor='not-allowed';
    });
  }else{
    banTip.style.display='none';
    document.querySelectorAll('button').forEach(btn=>{
      btn.disabled=false;
      btn.style.opacity='1';
      btn.style.cursor='pointer';
    });
  }
}

function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  if(id==='homePage')loadVideos();
  if(id==='mePage'){loadMe();checkBanStatus();}
  if(id==='msgPage')loadMsgs();
}

function updateAvatar(url,name){
  const img=document.getElementById('avatarImg');
  const ph=document.getElementById('avatarPlaceholder');
  if(url){img.src=url;img.style.display='block';ph.style.display='none';}
  else{img.style.display='none';ph.style.display='flex';ph.innerText=(name||'U')[0].toUpperCase();}
}

function toggleAppeal(b){document.getElementById('appealBtn').style.display=b?'block':'none';}

async function login(){
  const u=document.getElementById('user').value,p=document.getElementById('pwd').value;
  if(!u||!p)return alert('请输入账号密码');
  const {data,error}=await sb.from('users').select('*').eq('username',u).eq('password',p);
  if(error||!data.length)return alert('账号或密码错误');
  user=data[0];
  if(user.status==='封禁'){
    alert('⚠️ 您的账号已被封禁，部分功能受限，请提交申诉');
  }
  toggleAppeal(user.status==='封禁');
  updateAvatar(user.avatar,user.username);
  checkBanStatus();
  alert('登录成功');
  go('homePage');
}

async function reg(){
  const u=document.getElementById('user').value,p=document.getElementById('pwd').value;
  if(!u||!p)return alert('请输入完整信息');
  const {data:exist}=await sb.from('users').select('username').eq('username',u);
  if(exist.length)return alert('账号已存在');
  await sb.from('users').insert([{username:u,password:p,status:'正常',avatar:''}]);
  alert('注册成功！请登录');
}

function logout(){user=null;banTip.style.display='none';go('loginPage');}

document.getElementById('avatarFile').onchange=async e=>{
  if(!user)return;const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=async ev=>{
    await sb.from('users').update({avatar:ev.target.result}).eq('id',user.id);
    user.avatar=ev.target.result;updateAvatar(user.avatar,user.username);alert('头像上传成功');
  };r.readAsDataURL(f);
};

// ✅ 已修复：作品发布逻辑（现在100%能发）
async function upload(){
  if(!user)return alert('请先登录');
  if(user.status==='封禁')return alert('⚠️ 您的账号已被封禁，无法发布作品');
  
  const f=document.getElementById('vfile').files[0];
  const t=document.getElementById('vtitle').value;
  
  if(!f){
    alert('请选择视频文件');
    return;
  }
  if(!t){
    alert('请填写视频描述');
    return;
  }

  const url = URL.createObjectURL(f);

  // 修复：数据库插入 + 错误提示
  const { error } = await sb.from('videos').insert([
    { 
      user_id: user.id, 
      title: t, 
      url: url, 
      likes: 0, 
      created_at: new Date().toISOString() 
    }
  ]);

  if(error){
    alert('发布失败：'+error.message);
    return;
  }

  alert('发布成功！');
  
  // 清空输入框
  document.getElementById('vfile').value = '';
  document.getElementById('vtitle').value = '';

  go('homePage');
  loadVideos();
  loadMe();
}

async function loadVideos(){
  const {data,error}=await sb.from('videos').select('*,users(username,avatar)').order('created_at',{ascending:false});
  if(error)return;videosCache=data;const box=document.getElementById('videoList');box.innerHTML='';
  data.forEach(v=>{
    const d=document.createElement('div');d.className='item';
    d.innerHTML=`<video src="${v.url}" controls></video><div style="padding:10px">@${v.users?.username||'未知'}｜${v.title}｜点赞：${v.likes||0}</div><button onclick="like(${v.id})">点赞</button><button onclick="report(${v.id})">举报</button><input id="c${v.id}" placeholder="评论"><button onclick="cmt(${v.id})">发送</button><div id="cc${v.id}"></div>`;
    box.appendChild(d);loadCmt(v.id);
  });
}

async function like(id){
  if(!user)return alert('请先登录');
  if(user.status==='封禁')return alert('⚠️ 您的账号已被封禁，无法点赞');
  const {data}=await sb.from('videos').select('likes').eq('id',id).single();
  await sb.from('videos').update({likes:(data.likes||0)+1}).eq('id',id);
  loadVideos();
}

async function report(id){
  if(!user)return alert('请先登录');
  if(user.status==='封禁')return alert('⚠️ 您的账号已被封禁，无法举报');
  await sb.from('reports').insert([{video_id:id,user_id:user.id,content:'举报'}]);
  alert('举报成功');
}

async function cmt(id){
  if(!user)return alert('请先登录');
  if(user.status==='封禁')return alert('⚠️ 您的账号已被封禁，无法评论');
  const t=document.getElementById(`c${id}`).value;
  if(!t)return alert('请输入评论内容');
  await sb.from('comments').insert([{video_id:id,user_id:user.id,content:t}]);
  document.getElementById(`c${id}`).value='';
  loadCmt(id);
}

async function loadCmt(id){
  const {data}=await sb.from('comments').select('*,users(username)').eq('video_id',id);
  document.getElementById(`cc${id}`).innerHTML=data?data.map(c=>`<div class="comment">@${c.users?.username||'未知'}：${c.content}</div>`).join(''):'';
}

async function loadMe(){
  if(!user)return;
  document.getElementById('profileUsername').innerText=user.username;
  toggleAppeal(user.status==='封禁');
  updateAvatar(user.avatar,user.username);
  const {data:my}=await sb.from('videos').select('*').eq('user_id',user.id);
  document.getElementById('statVideos').innerText=my.length;
  const box=document.getElementById('myVideos');box.innerHTML='';
  my.forEach(v=>{
    const d=document.createElement('div');d.className='profile-video-item';
    d.innerHTML=`<video src="${v.url}" muted></video>`;
    d.onclick=()=>{
      if(user.status==='封禁')return alert('⚠️ 您的账号已被封禁，无法播放');
      const vid=document.createElement('video');
      vid.src=v.url;vid.controls=true;vid.style.width='100vw';vid.style.height='100vh';vid.style.position='fixed';vid.style.top=0;vid.style.left=0;vid.style.zIndex=9999;
      document.body.appendChild(vid);
      vid.onended=()=>document.body.removeChild(vid);
      vid.requestFullscreen().catch(()=>{});
    };
    box.appendChild(d);
  });
}

async function sendMsg(){
  if(!user)return alert('请先登录');
  if(user.status==='封禁')return alert('⚠️ 您的账号已被封禁，无法发送私信');
  const t=document.getElementById('toUser').value,c=document.getElementById('msgText').value;
  if(!t||!c)return alert('请输入完整内容');
  await sb.from('messages').insert([{from_uid:user.id,to_user:t,content:c}]);
  alert('发送成功');loadMsgs();
}

async function loadMsgs(){
  if(!user)return;
  const {data}=await sb.from('messages').select('*,users(username)').eq('to_user',user.username);
  document.getElementById('msgList').innerHTML=data?data.map(m=>`<div class="comment">@${m.users?.username||'未知'}：${m.content}</div>`).join(''):'';
}

async function sendAppeal(){
  if(!user)return alert('请先登录');
  const t=document.getElementById('appealText').value;
  if(!t)return alert('请输入申诉理由');
  await sb.from('appeals').insert([{uid:user.id,reason:t,status:'待处理'}]);
  alert('申诉提交成功，管理员会尽快处理');
  go('mePage');
}

function adminLogin(){
  if(document.getElementById('adminPwd').value===ADMIN_PWD)alert('管理员登录成功');
  else alert('密码错误');
}

async function banUser(){
  const u=document.getElementById('banUid').value;
  if(!u)return alert('请输入用户ID');
  await sb.from('users').update({status:'封禁'}).eq('id',u);
  alert('封禁成功');
  if(user && user.id==u){
    user.status='封禁';
    checkBanStatus();
  }
}

async function unbanUser(){
  const u=document.getElementById('unbanUid').value;
  if(!u)return alert('请输入用户ID');
  await sb.from('users').update({status:'正常'}).eq('id',u);
  alert('解封成功');
  if(user && user.id==u){
    user.status='正常';
    checkBanStatus();
  }
}

async function showReports(){
  const {data}=await sb.from('reports').select();
  document.getElementById('reportList').innerHTML=data?data.map(r=>`<div class="item">举报视频：${r.video_id}，用户ID：${r.user_id}</div>`).join(''):'暂无举报';
}

async function showAppeals(){
  const {data}=await sb.from('appeals').select();
  document.getElementById('appealList').innerHTML=data?data.map(a=>`<div class="item">申诉用户ID：${a.uid}，理由：${a.reason}，状态：${a.status}</div>`).join(''):'暂无申诉';
}
</script>
</body>
</html>
