<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>离门团队视频</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:"Microsoft YaHei",sans-serif;overflow:hidden}
.hidden{display:none!important}

.top-bar{position:fixed;top:0;left:0;width:100%;height:46px;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.time-text{font-size:13px;color:#fff}

#banBar{
  position:fixed;top:46px;left:0;width:100%;background:red;color:#fff;text-align:center;padding:6px 0;font-size:13px;z-index:9999;display:none
}

.tab-bar{position:fixed;bottom:0;left:0;width:100%;height:50px;background:#111;display:flex;align-items:center;justify-content:space-around;z-index:9999;border-top:1px solid #333}
.tab-item{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#999;cursor:pointer}
.tab-item.active{color:#fff}

.swipe-container{width:100vw;height:100vh;overflow-y:auto;scroll-snap-type:y mandatory}
.swipe-page{width:100vw;height:100vh;scroll-snap-align:start;position:relative}
.video{width:100%;height:100%;object-fit:cover}

.right-bar{position:fixed;right:10px;bottom:100px;display:flex;flex-direction:column;gap:18px;z-index:9999}
.right-btn{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;cursor:pointer}
.right-btn span{font-size:18px}

.profile-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;padding:20px;border-radius:12px;width:80%;z-index:99999;display:none}
.profile-close{position:absolute;top:10px;right:10px;background:red;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer}
</style>
</head>
<body>

<div id="banBar">该用户因违反社区规范已被封禁</div>

<div class="top-bar">
  <div class="time-text" id="topTime"></div>
</div>

<div class="swipe-container" id="swipeContainer"></div>

<div class="right-bar">
  <div class="right-btn" onclick="likeVideo()"><span>❤️</span><span id="likeCount">0</span></div>
  <div class="right-btn" onclick="openComment()"><span>💬</span><span id="commentCount">0</span></div>
  <div class="right-btn" onclick="collectVideo()"><span>⭐</span><span id="collectCount">0</span></div>
  <div class="right-btn" onclick="reportVideo()"><span>🚨</span>举报</div>
  <div class="right-btn" onclick="followUser()"><span>➕</span>关注</div>
</div>

<div class="profile-card" id="profileCard">
  <button class="profile-close" onclick="closeProfile()">×</button>
  <div id="profileInfo"></div>
</div>

<div class="tab-bar">
  <div class="tab-item active" onclick="goHome()">首页</div>
  <div class="tab-item" onclick="goMsg()">消息</div>
  <div class="tab-item" onclick="goUpload()">发布</div>
  <div class="tab-item" onclick="goMe()">我的</div>
  <div class="tab-item" onclick="goAdmin()">后台</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient("https://melgyktzmzyednqtmqfz.supabase.co","sb_publishable_iS4ChZxw5ixbg7S-y-Vddw_YQZ6SHMV");
let user=null;
let videos=[];
let currentVideo=0;
const ADMIN_PWD="1234567890";

function updateTime(){
  const d=new Date();
  document.getElementById("topTime").innerText=d.toLocaleString();
}
setInterval(updateTime,1000);
updateTime();

async function initAI(){
  const {data:ais}=await sb.from("users").select("id").eq("is_ai",true);
  if(ais&&ais.length>=10)return;

  const aiList=[
    {username:"AI风景01",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景02",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景03",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景04",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景05",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景06",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景07",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景08",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景09",password:"123456",status:"正常",is_ai:true},
    {username:"AI风景10",password:"123456",status:"正常",is_ai:true}
  ];
  await sb.from("users").insert(aiList);

  const {data:users}=await sb.from("users").select("id").eq("is_ai",true);
  if(!users)return;

  const vUrls=[
    "https://www.w3school.com.cn/i/movie.mp4",
    "https://www.w3school.com.cn/i/movie.mp4",
    "https://www.w3school.com.cn/i/movie.mp4"
  ];

  const batch=users.flatMap(u=>
    vUrls.map(v=>({
      user_id:u.id,
      title:"风景",
      url:v,
      likes:0,
      comments:0,
      collects:0,
      created_at:new Date().toISOString()
    }))
  );
  await sb.from("videos").insert(batch);
}

async function loadVideos(){
  await initAI();
  const {data}=await sb.from("videos").select("*,users(username,status,ban_end)").order("created_at",{ascending:false});
  if(!data)return;
  videos=data;
  const box=document.getElementById("swipeContainer");
  box.innerHTML="";
  videos.forEach((v,i)=>{
    const p=document.createElement("div");
    p.className="swipe-page";
    p.innerHTML=`<video class="video" src="${v.url}" loop muted playsinline></video>
<div style="position:absolute;bottom:80px;left:14px;z-index:9999;color:#fff;cursor:pointer" onclick="openProfile(${v.user_id})">@${v.users.username}</div>`;
    box.appendChild(p);
  });
}

function likeVideo(){
  if(!user||user.status==="封禁")return alert("请先登录或账号已封禁");
  alert("点赞成功");
}
function openComment(){
  if(!user||user.status==="封禁")return alert("请先登录或账号已封禁");
  const t=prompt("输入评论");
  if(t)alert("评论成功");
}
function collectVideo(){
  if(!user||user.status==="封禁")return alert("请先登录或账号已封禁");
  alert("收藏成功");
}
function reportVideo(){
  if(!user)return alert("请先登录");
  const r=prompt("举报原因：1违规 2不良 3其他");
  if(r)alert("举报已提交，平台将审核");
}
function followUser(){
  if(!user||user.status==="封禁")return alert("请先登录或账号已封禁");
  alert("关注成功");
}

async function openProfile(uid){
  const {data:u}=await sb.from("users").select("*").eq("id",uid).single();
  if(!u)return;
  const c=document.getElementById("profileCard");
  const i=document.getElementById("profileInfo");
  if(u.status==="封禁"){
    i.innerHTML=`<div style="color:red">该用户因违反社区规范已被封禁</div><div>解封时间：${u.ban_end||"暂无"}</div>`;
  }else{
    i.innerHTML=`用户名：${u.username}<br>状态：正常`;
  }
  c.style.display="block";
}
function closeProfile(){
  document.getElementById("profileCard").style.display="none";
}

function checkBan(){
  const bar=document.getElementById("banBar");
  const btn=document.getElementById("appealBtn");
  if(user&&user.status==="封禁"){
    bar.style.display="block";
    if(btn)btn.style.display="block";
  }else{
    bar.style.display="none";
    if(btn)btn.style.display="none";
  }
}

async function login(){
  const userInput=document.getElementById("loginUser")?.value||"";
  const pwdInput=document.getElementById("loginPwd")?.value||"";
  if(!userInput||!pwdInput)return alert("请输入账号密码");
  const {data}=await sb.from("users").select("*").eq("username",userInput).eq("password",pwdInput);
  if(!data||data.length===0)return alert("登录失败");
  user=data[0];
  checkBan();
  if(user.status==="封禁")alert("您的账号已被封禁，解封时间："+(user.ban_end||"暂无"));
  alert("登录成功");
  loadVideos();
}

async function banUser(){
  const uid=document.getElementById("banUid")?.value;
  if(!uid)return alert("请输入ID");
  const end=new Date(Date.now()+86400000).toLocaleString();
  await sb.from("users").update({status:"封禁",ban_end:end}).eq("id",uid);
  alert("封禁成功："+end);
  if(user&&user.id==uid){user.status="封禁";user.ban_end=end;checkBan();}
}

async function unbanUser(){
  const uid=document.getElementById("unbanUid")?.value;
  if(!uid)return alert("请输入ID");
  await sb.from("users").update({status:"正常",ban_end:null}).eq("id",uid);
  alert("解封成功");
  if(user&&user.id==uid){user.status="正常";user.ban_end=null;checkBan();}
}

function goHome(){loadVideos();}
function goMsg(){}
function goUpload(){}
function goMe(){checkBan();}
function goAdmin(){}

loadVideos();
</script>
</body>
</html>
