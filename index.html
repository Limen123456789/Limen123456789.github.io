<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>离门团队视频</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
body {background:#000;color:#fff;font-family:"Microsoft YaHei",sans-serif;overflow:hidden}
.hidden {display:none !important}

.top-bar {position:fixed;top:0;left:0;width:100%;height:46px;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.time-text {font-size:13px;color:#fff}

.tab-bar {position:fixed;bottom:0;left:0;width:100%;height:50px;background:#111;display:flex;align-items:center;justify-content:space-around;z-index:9999;border-top:1px solid #333}
.tab-item {display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#999;cursor:pointer}
.tab-item.active {color:#fff}
.tab-plus {width:50px;height:50px;border-radius:50%;background:#070;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin-top:-10px;z-index:99999}

.video-page {width:100vw;height:calc(100vh - 50px);position:relative;overflow:hidden}
.video-container {width:100%;height:100%;position:relative}
video {width:100%;height:100%;object-fit:cover;background:#000}

.user-info {position:fixed;left:14px;bottom:80px;z-index:99999;display:flex;align-items:center;gap:12px}
.avatar {width:56px;height:56px;border-radius:50%;background:#fff;overflow:hidden;border:2px solid #fff;cursor:pointer}
.avatar img {width:100%;height:100%;object-fit:cover;display:block}
.user-name {font-size:18px;font-weight:bold;margin-bottom:6px}
.follow-btn {background:#ff4400;color:#fff;border:none;padding:7px 18px;border-radius:20px;font-size:14px;font-weight:bold;cursor:pointer}
.followed {background:#333;color:#fff}
.report-btn {background:#f00;color:#fff;border:none;padding:7px 14px;border-radius:16px;font-size:13px;margin-top:6px;cursor:pointer;z-index:999999}

.right-bar {position:fixed;right:14px;bottom:80px;z-index:99999;display:flex;flex-direction:column;gap:16px;align-items:center}
.icon-btn {width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}
.icon-count {font-size:12px;margin-top:3px}

.progress {position:fixed;bottom:18px;left:14px;width:calc(100% - 28px);height:5px;background:#444;border-radius:3px;z-index:9999;cursor:pointer}
.progress-bar {height:100%;width:0%;background:#0f0;border-radius:3px}

.upload-btn {position:fixed;top:56px;left:14px;z-index:9999;width:calc(100% - 28px);padding:10px;background:#070;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.upload-progress {position:fixed;top:100px;left:14px;width:calc(100% - 28px);height:5px;background:#444;border-radius:3px;z-index:9999;display:none}
.upload-bar {height:100%;width:0%;background:#0f0;border-radius:3px}

.my-page,.user-page,.ban-page,.msg-page,.chat-page,.work-page {
  position:fixed;inset:0;background:#fff;z-index:10000;display:none;overflow:auto;padding-bottom:50px;color:#000
}
.my-header {height:140px;background:#f5f5f5;display:flex;align-items:center;padding:18px;gap:14px;position:relative}
.my-avatar {width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid #fff}
.my-avatar img {width:100%;height:100%;object-fit:cover}
.my-info {flex:1}
.my-name {font-size:20px;font-weight:bold;margin-bottom:6px}
.my-follow {display:flex;gap:18px;margin-top:8px}
.my-follow-item {text-align:center}
.my-follow-num {font-size:17px;font-weight:bold}
.my-follow-text {font-size:12px;color:#999}
.back-btn {position:absolute;top:12px;left:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer}

.user-head {height:150px;background:#111;color:#fff;display:flex;align-items:center;gap:12px;padding:12px;position:relative}
.user-av {width:64px;height:64px;border-radius:50%;overflow:hidden}
.user-work {display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;padding:10px}
.user-work-item {aspect-ratio:9/16;background:#000;border-radius:8px;overflow:hidden;cursor:pointer}
.user-work-item video {width:100%;height:100%;object-fit:cover}

input, textarea, select {
  width:100%;padding:12px;margin:8px 0;background:#222;border:2px solid #0f0;color:#fff;border-radius:12px;font-size:16px;
  outline:none;transition:border 0.2s
}
input:focus, textarea:focus, select:focus {border-color:#0f0;box-shadow:0 0 0 3px rgba(0,255,0,0.2)}
.btn {
  width:100%;padding:14px;background:#070;color:#fff;border:none;border-radius:12px;margin-top:8px;font-size:18px;font-weight:bold;
  cursor:pointer;transition:background 0.2s
}
.btn:hover {background:#0a0}
.btn-secondary {background:#333}
.btn-danger {background:#f00}

.auth-page {position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card {width:100%;max-width:360px;background:#111;padding:24px;border-radius:16px;border:2px solid #0f0}

.modal {position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999999;display:none;align-items:center;justify-content:center;padding:20px}
.modal-card {
  width:100%;max-width:420px;background:#111;padding:24px;border-radius:16px;border:2px solid #0f0;color:#fff;
  max-height:80vh;overflow:auto
}

.refresh-tip{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:#0f0;color:#000;padding:5px 10px;border-radius:20px;font-size:12px;z-index:99999;display:none}

/* 举报弹窗 */
#reportModal .modal-card h4 {font-size:24px;margin-bottom:16px}
#reportTarget {background:#333;cursor:not-allowed;}
#reportType {appearance:none;background:#222 url('data:image/svg+xml;utf8,<svg fill="%230f0" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>') no-repeat right 12px center;background-size:20px}
#reportMsg {min-height:100px;resize:none}

/* 消息页 */
.msg-page {background:#f5f5f5;padding-top:50px}
.msg-list {padding:10px}
.msg-item {
  display:flex;align-items:center;gap:12px;padding:12px;background:#fff;margin:6px 10px;border-radius:12px;cursor:pointer;
  border:1px solid #eee;transition:background 0.2s
}
.msg-item:hover {background:#f0f0f0}
.msg-avatar {width:48px;height:48px;border-radius:50%;background:#ddd;overflow:hidden}
.msg-avatar img {width:100%;height:100%;object-fit:cover}
.msg-info {flex:1}
.msg-name {font-size:16px;font-weight:bold}
.msg-last {font-size:13px;color:#666;margin-top:2px}

/* 聊天页 */
.chat-page {background:#f5f5f5;padding-top:50px;padding-bottom:70px}
.chat-header {
  position:fixed;top:0;left:0;width:100%;height:50px;background:#fff;display:flex;align-items:center;padding:0 14px;
  border-bottom:1px solid #eee;z-index:10001
}
.chat-list {padding:10px;margin-top:50px;margin-bottom:70px}
.chat-item {
  display:flex;margin:8px 10px;max-width:70%
}
.chat-item.me {justify-content:flex-end;margin-left:auto}
.chat-item.other {justify-content:flex-start;margin-right:auto}
.chat-bubble {
  padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.4
}
.chat-item.me .chat-bubble {background:#070;color:#fff;border-bottom-right-radius:4px}
.chat-item.other .chat-bubble {background:#fff;color:#000;border-bottom-left-radius:4px;border:1px solid #eee}
.chat-input {
  position:fixed;bottom:50px;left:0;width:100%;display:flex;gap:8px;padding:10px;background:#fff;
  border-top:1px solid #eee;z-index:10001
}
.chat-input input {flex:1;margin:0;background:#f5f5f5;border:2px solid #0f0;border-radius:24px;padding:12px 16px}
.chat-input button {
  width:80px;background:#070;color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:bold;
  cursor:pointer
}

/* 封禁弹窗 */
#banModal .modal-card h4 {font-size:20px;margin-bottom:12px}
.ban-item {
  border:1px solid #333;padding:10px;margin:8px;border-radius:8px
}
.ban-btn {
  padding:6px 12px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;margin-left:8px
}
.ban-btn.ban {background:#f00;color:#fff}
.ban-btn.unban {background:#070;color:#fff}
</style>
</head>
<body>

<div class="refresh-tip" id="refreshTip">同步成功</div>

<div class="top-bar">
  <span onclick="openMyPage()">我</span>
  <span>离门团队视频</span>
  <span onclick="openAdmin()">管理</span>
  <span class="time-text" id="realTime"></span>
</div>

<div class="video-page hidden" id="videoPage">
  <div class="video-container">
    <video id="mainVideo" playsinline preload="auto" muted></video>
  </div>
  <div class="user-info">
    <div class="avatar" id="userAvatar" onclick="openOtherUserPage()"><img src="https://via.placeholder.com/56"></div>
    <div>
      <div class="user-name" id="userName"></div>
      <button class="follow-btn" id="followBtn" onclick="toggleFollow()">关注</button>
      <button class="report-btn" onclick="openReport(currentUserName)">举报</button>
    </div>
  </div>
  <div class="right-bar">
    <div class="icon-btn" onclick="toggleLike()">❤️</div>
    <div class="icon-count" id="likeCount">0</div>
    <div class="icon-btn" onclick="openComment()">💬</div>
    <div class="icon-count" id="commentCount">0</div>
    <div class="icon-btn" onclick="toggleCollect()">⭐</div>
    <div class="icon-count" id="collectCount">0</div>
    <div class="icon-btn" onclick="openShare()">📤</div>
  </div>
  <div class="progress" id="progressBarWrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<button class="upload-btn" onclick="document.getElementById('uploadVideo').click()">📤 上传视频</button>
<div class="upload-progress" id="uploadProgress"><div class="upload-bar" id="uploadBar"></div></div>

<div class="auth-page" id="authPage">
  <div class="auth-card">
    <h3 style="text-align:center;margin-bottom:16px;font-size:22px">登录 / 注册</h3>
    <input id="regUser" placeholder="账号（必填）">
    <input id="regPwd" type="password" placeholder="密码（必填）">
    <button class="btn" id="btnRegister">注册</button>
    <button class="btn btn-secondary" id="btnLogin">登录</button>
  </div>
</div>

<div class="my-page" id="myPage">
  <div class="my-header">
    <div class="back-btn" onclick="switchTab('home')">←</div>
    <div class="my-avatar"><img id="myAvatar" src="https://via.placeholder.com/72"></div>
    <div class="my-info">
      <div class="my-name" id="myName"></div>
      <div class="my-follow">
        <div class="my-follow-item"><div class="my-follow-num" id="fansNum">0</div><div class="my-follow-text">粉丝</div></div>
        <div class="my-follow-item"><div class="my-follow-num" id="followNum">0</div><div class="my-follow-text">关注</div></div>
        <div class="my-follow-item"><div class="my-follow-num" id="likeNum">0</div><div class="my-follow-text">获赞</div></div>
      </div>
    </div>
  </div>
  <div style="padding:14px">
    <div class="my-item" onclick="openWorkPage()" style="padding:12px;border-bottom:1px solid #eee;display:flex;gap:12px;align-items:center;cursor:pointer">
      <span>📹</span><span>我的作品</span>
    </div>
    <div class="my-item" onclick="openMsgPage()" style="padding:12px;border-bottom:1px solid #eee;display:flex;gap:12px;align-items:center;cursor:pointer">
      <span>📩</span><span>消息</span>
    </div>
    <div class="my-item" onclick="openAdmin()" style="padding:12px;border-bottom:1px solid #eee;display:flex;gap:12px;align-items:center;cursor:pointer">
      <span>🔐</span><span>管理后台</span>
    </div>
  </div>
</div>

<div class="user-page" id="userPage">
  <div class="user-head">
    <div class="back-btn" onclick="closeUserPage()">←</div>
    <div class="user-av"><img id="targetAv" src="https://via.placeholder.com/64"></div>
    <div>
      <div style="font-size:17px" id="targetName"></div>
      <div style="font-size:13px;color:#ccc;margin-top:4px" id="userStat"></div>
      <button class="report-btn" onclick="openReport(document.getElementById('targetName').textContent)">举报</button>
    </div>
  </div>
  <div class="user-work" id="targetWork"></div>
</div>

<!-- 举报弹窗 -->
<div class="modal" id="reportModal">
  <div class="modal-card">
    <h4>举报</h4>
    <input id="reportTarget" readonly placeholder="被举报用户">
    <select id="reportType">
      <option>作品违规</option>
      <option>辱骂人身攻击</option>
      <option>私信骚扰</option>
      <option>其他违规</option>
    </select>
    <textarea id="reportMsg" placeholder="请补充举报说明（选填）"></textarea>
    <button class="btn" onclick="submitReport()">提交</button>
    <button class="btn btn-secondary" onclick="closeReport()">取消</button>
  </div>
</div>

<!-- 消息列表页 -->
<div class="msg-page" id="msgPage">
  <div class="back-btn" onclick="closeMsgPage()">←</div>
  <div class="msg-list" id="msgList"></div>
</div>

<!-- 聊天页 -->
<div class="chat-page" id="chatPage">
  <div class="chat-header">
    <div class="back-btn" onclick="closeChatPage()">←</div>
    <div id="chatTargetName" style="font-size:18px;font-weight:bold;margin-left:12px"></div>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="chat-input">
    <input id="chatInput" placeholder="输入消息">
    <button onclick="sendChatMsg()">发送</button>
  </div>
</div>

<!-- 管理员登录弹窗 -->
<div class="modal" id="adminLoginModal">
  <div class="modal-card">
    <h4>管理员验证</h4>
    <input id="adminPwd" type="password" placeholder="密码">
    <button class="btn" onclick="checkAdminPwd()">登录</button>
    <button class="btn btn-secondary" onclick="closeAdminLogin()">取消</button>
  </div>
</div>

<!-- 管理员后台弹窗 -->
<div class="modal" id="adminModal">
  <div class="modal-card">
    <h4>管理后台</h4>
    <button class="btn" onclick="showReports()">查看所有举报</button>
    <button class="btn" onclick="showWorks()">所有作品</button>
    <button class="btn" onclick="showChatLog()">私信记录</button>
    <!-- 新增封禁功能按钮 -->
    <button class="btn btn-danger" onclick="openBanManage()">封禁/解封账号</button>
    <button class="btn btn-secondary" onclick="closeAdmin()">关闭</button>
    <div id="adminContent" style="margin-top:10px"></div>
  </div>
</div>

<!-- 封禁管理弹窗 -->
<div class="modal" id="banModal">
  <div class="modal-card">
    <h4>账号封禁管理</h4>
    <div id="banUserList"></div>
    <button class="btn btn-secondary" onclick="closeBanModal()">返回</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tabHome" onclick="switchTab('home')">精选</div>
  <div class="tab-item tab-plus" onclick="document.getElementById('uploadVideo').click()">+</div>
  <div class="tab-item" id="tabMsg" onclick="switchTab('msg')">消息</div>
  <div class="tab-item" id="tabMy" onclick="switchTab('my')">我</div>
</div>

<input type="file" hidden id="uploadVideo" accept="video/*" onchange="uploadVideo(event)">

<script>
// ======================
// 全局存储（稳定版，修复数据丢失）
// ======================
const DB_KEY = "LIMEN_GLOBAL_DB";
const USER_KEY = "LIMEN_LOGIN_USER";
const ADMIN_PWD = "1234567890";

// 初始化默认数据，防止空数据
function initDB() {
  const defaultDB = { 
    users: [
      { user: "admin", pwd: "admin123", isBanned: false, banExpire: 0, isAdmin: true }
    ], 
    works: [], 
    reports: [], 
    likes: [], 
    comments: [], 
    chats: [], 
    bans: [] 
  };
  if (!localStorage.getItem(DB_KEY)) {
    localStorage.setItem(DB_KEY, JSON.stringify(defaultDB));
  }
}
initDB();

function getDB() {
  try {
    let s = localStorage.getItem(DB_KEY);
    return s ? JSON.parse(s) : { 
      users: [{ user: "admin", pwd: "admin123", isBanned: false, banExpire: 0, isAdmin: true }], 
      works: [], reports: [], likes: [], comments: [], chats: [], bans: [] 
    };
  } catch (e) {
    return { 
      users: [{ user: "admin", pwd: "admin123", isBanned: false, banExpire: 0, isAdmin: true }], 
      works: [], reports: [], likes: [], comments: [], chats: [], bans: [] 
    };
  }
}
function setDB(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  document.getElementById("refreshTip").style.display = "block";
  setTimeout(()=>{document.getElementById("refreshTip").style.display = "none"},1500);
}

function getUsers()   { return getDB().users || []; }
function getWorks()   { return getDB().works || []; }
function getReports() { return getDB().reports || []; }
function getLikes()   { return getDB().likes || []; }
function getComments(){ return getDB().comments || []; }
function getChats()   { return getDB().chats || []; }
function getBans()    { return getDB().bans || []; }

function saveUsers(users)   { let d=getDB(); d.users=users; setDB(d); }
function saveWorks(works)   { let d=getDB(); d.works=works; setDB(d); }
function saveReports(reports) { let d=getDB(); d.reports=reports; setDB(d); }
function saveLikes(likes)   { let d=getDB(); d.likes=likes; setDB(d); }
function saveComments(comments){ let d=getDB(); d.comments=comments; setDB(d); }
function saveChats(chats)   { let d=getDB(); d.chats=chats; setDB(d); }
function saveBans(bans)    { let d=getDB(); d.bans=bans; setDB(d); }

function saveLoginUser(user) { localStorage.setItem(USER_KEY, user); }
function getLoginUser() { return localStorage.getItem(USER_KEY) || null; }

// ======================
// 全局变量
// ======================
let currentUser = getLoginUser();
let currentWorkIndex = 0;
let currentChatTarget = null;
let currentUserName = "";
let works = getWorks();
let users = getUsers();

// ======================
// 工具
// ======================
function updateTime() {
  let d = new Date();
  let h = String(d.getHours()).padStart(2, '0');
  let m = String(d.getMinutes()).padStart(2, '0');
  document.getElementById("realTime").innerText = `${h}:${m}`;
}
setInterval(updateTime, 1000);
updateTime();

function refreshAllData() {
  works = getWorks();
  users = getUsers();
}

// ======================
// 视频上下滑+进度条
// ======================
let startY = 0;
document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  let dy = e.changedTouches[0].clientY - startY;
  if (Math.abs(dy) > 70) {
    dy > 0 ? prevVideo() : nextVideo();
  }
});

const video = document.getElementById("mainVideo");
const progressBar = document.getElementById("progressBar");
const progressWrap = document.getElementById("progressBarWrap");

video.addEventListener('timeupdate', () => {
  const percent = (video.currentTime / video.duration) * 100;
  progressBar.style.width = `${percent}%`;
});

progressWrap.addEventListener('click', (e) => {
  const rect = progressWrap.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const width = rect.width;
  video.currentTime = (clickX / width) * video.duration;
});

function nextVideo() {
  refreshAllData();
  if (works.length === 0) return;
  currentWorkIndex = (currentWorkIndex + 1) % works.length;
  loadCurrent();
}
function prevVideo() {
  refreshAllData();
  if (works.length === 0) return;
  currentWorkIndex = (currentWorkIndex - 1 + works.length) % works.length;
  loadCurrent();
}

function loadCurrent() {
  refreshAllData();
  if (works.length === 0) return;
  let w = works[currentWorkIndex];
  currentUserName = w.user;
  document.getElementById("userName").innerText = currentUserName;
  let v = document.getElementById("mainVideo");
  v.src = w.url;
  v.load();
  v.play().catch(() => {});
  updateLike();
}

function updateLike() {
  if (works.length === 0) return;
  let cnt = getLikes().filter(x => x.wid == currentWorkIndex).length;
  document.getElementById("likeCount").innerText = cnt;
}

function toggleLike() {
  if (!currentUser || works.length === 0) {
    alert("请先登录才能点赞！");
    return;
  }
  let likes = getLikes();
  let idx = likes.findIndex(x => x.wid == currentWorkIndex && x.uid == currentUser);
  if (idx === -1) {
    likes.push({ wid: currentWorkIndex, uid: currentUser });
  } else {
    likes.splice(idx, 1);
  }
  saveLikes(likes);
  updateLike();
}

// ======================
// 注册/登录
// ======================
function doRegister() {
  let user = document.getElementById("regUser").value.trim();
  let pwd = document.getElementById("regPwd").value.trim();

  if (!user || !pwd) {
    alert("账号和密码不能为空！");
    return;
  }

  refreshAllData();
  let exists = users.some(u => u.user === user);
  if (exists) {
    alert("该账号已注册，请直接登录！");
    return;
  }

  users.push({ user, pwd, isBanned: false, banExpire: 0, isAdmin: false });
  saveUsers(users);
  alert("注册成功！请登录");
  document.getElementById("regUser").value = user;
}

function doLogin() {
  let user = document.getElementById("regUser").value.trim();
  let pwd = document.getElementById("regPwd").value.trim();

  if (!user || !pwd) {
    alert("请输入账号和密码！");
    return;
  }

  refreshAllData();
  let found = users.find(u => u.user === user && u.pwd === pwd);
  if (!found) {
    alert("账号或密码错误！");
    return;
  }

  if (found.isBanned && found.banExpire > Date.now()) {
    alert(`账号已封禁，解封时间：${new Date(found.banExpire).toLocaleString()}`);
    return;
  }

  currentUser = user;
  saveLoginUser(user);
  goHome();
}

function goHome() {
  document.getElementById("authPage").style.display = "none";
  document.getElementById("videoPage").classList.remove("hidden");
  document.getElementById("myName").textContent = currentUser;
  refreshAllData();
  if (works.length > 0) loadCurrent();
}

// ======================
// 举报功能
// ======================
function openReport(user) {
  if (!currentUser) { 
    alert("请先登录才能举报！"); 
    return; 
  }
  document.getElementById("reportTarget").value = user || "未知用户";
  document.getElementById("reportMsg").value = "";
  document.getElementById("reportModal").style.display = "flex";
}
function closeReport() { document.getElementById("reportModal").style.display = "none"; }
function submitReport() {
  let target = document.getElementById("reportTarget").value.trim();
  let type = document.getElementById("reportType").value;
  let msg = document.getElementById("reportMsg").value.trim();
  
  if (!target) {
    alert("被举报用户不能为空！");
    return;
  }
  if (!currentUser) {
    alert("请先登录再举报！");
    return;
  }
  
  let reports = getReports();
  reports.push({
    from: currentUser,
    target: target,
    type: type,
    msg: msg,
    time: new Date().toLocaleString(),
    status: "待处理"
  });
  saveReports(reports);
  
  alert("举报提交成功！管理员后台可查看");
  closeReport();
}

// ======================
// 管理员后台
// ======================
function openAdmin() {
  if (!currentUser) { alert("请先登录"); return; }
  document.getElementById("adminPwd").value = "";
  document.getElementById("adminLoginModal").style.display = "flex";
}
function closeAdminLogin() { document.getElementById("adminLoginModal").style.display = "none"; }
function checkAdminPwd() {
  let p = document.getElementById("adminPwd").value.trim();
  if (p !== ADMIN_PWD) { alert("密码错误"); return; }
  closeAdminLogin();
  document.getElementById("adminModal").style.display = "flex";
}
function closeAdmin() { document.getElementById("adminModal").style.display = "none"; }

// 查看所有举报（已加：已处理、驳回按钮）
function showReports() {
  let reports = getReports();
  let html = "<h5>所有举报（全设备同步）</h5>";
  if (reports.length === 0) {
    html += "<p style='color:#999'>暂无举报</p>";
  } else {
    reports.forEach((it, i) => {
      html += `
        <div style='border:1px solid #333;padding:10px;margin:8px;border-radius:8px'>
          <p><strong>举报人：</strong>${it.from}</p>
          <p><strong>被举报：</strong>${it.target}</p>
          <p><strong>类型：</strong>${it.type}</p>
          <p><strong>说明：</strong>${it.msg || '无'}</p>
          <p><strong>时间：</strong>${it.time}</p>
          <p><strong>状态：</strong>${it.status}</p>
          <button onclick="markReportDone(${i})" style="margin-top:8px;margin-right:4px;padding:6px 12px;background:#070;color:#fff;border:none;border-radius:6px">已处理</button>
          <button onclick="markReportReject(${i})" style="margin-top:8px;margin-right:4px;padding:6px 12px;background:#555;color:#fff;border:none;border-radius:6px">驳回</button>
          <button onclick="delReport(${i})" style="margin-top:8px;padding:6px 12px;background:#f00;color:#fff;border:none;border-radius:6px">删除举报</button>
        </div>
      `;
    });
  }
  document.getElementById("adminContent").innerHTML = html;
}

// 标记举报为已处理
function markReportDone(i) {
  let reports = getReports();
  if(reports[i]){
    reports[i].status = "已处理";
    saveReports(reports);
    showReports();
  }
}

// 标记举报为驳回
function markReportReject(i) {
  let reports = getReports();
  if(reports[i]){
    reports[i].status = "已驳回";
    saveReports(reports);
    showReports();
  }
}

function delReport(i) {
  let reports = getReports();
  reports.splice(i, 1);
  saveReports(reports);
  showReports();
}

// 所有作品
function showWorks() {
  let works = getWorks();
  let html = "<h5>所有作品</h5>";
  works.forEach((it, i) => {
    html += `
      <div style='border:1px solid #333;padding:10px;margin:8px;border-radius:8px'>
        <p><strong>作者：</strong>${it.user}</p>
        <p><strong>时间：</strong>${it.time}</p>

function delWork(i) {
  let works = getWorks();

}

// ======================
// 封禁/解封功能
// ======================
function openBanManage() {
  closeAdmin();
  let users = getUsers();
  let html = "<h5>账号列表</h5>";
  
  users.forEach((u, i) => {
    let banStatus = u.isBanned && u.banExpire > Date.now() 
      ? `已封禁，解封时间：${new Date(u.banExpire).toLocaleString()}` 
      : "正常";
    let banBtn = u.isBanned && u.banExpire > Date.now() 
      ? `<button class="ban-btn unban" onclick="unbanUser('${u.user}')">解封</button>` 
      : `<button class="ban-btn ban" onclick="banUser('${u.user}')">封禁</button>`;
    
    html += `
      <div class="ban-item">
        <p><strong>账号：</strong>${u.user}</p>
        <p><strong>状态：</strong>${banStatus}</p>
        ${banBtn}
      </div>
    `;
  });
  
  document.getElementById("banUserList").innerHTML = html;
  document.getElementById("banModal").style.display = "flex";
}

function closeBanModal() {
  document.getElementById("banModal").style.display = "none";
  document.getElementById("adminModal").style.display = "flex";
}

function banUser(username) {
  let days = prompt("请输入封禁天数（1-365）：", "7");
  if (!days || isNaN(days) || days < 1 || days > 365) {
    alert("请输入有效天数");
    return;
  }
  
  let users = getUsers();
  let user = users.find(u => u.user === username);
  if (!user) return;
  
  user.isBanned = true;
  user.banExpire = Date.now() + days * 24 * 60 * 60 * 1000;
  saveUsers(users);
  alert(`已封禁账号 ${username} ${days} 天`);
  openBanManage();
}

function unbanUser(username) {
  let users = getUsers();
  let user = users.find(u => u.user === username);
  if (!user) return;
  
  user.isBanned = false;
  user.banExpire = 0;
  saveUsers(users);
  alert(`已解封账号 ${username}`);
  openBanManage();
}

// ======================
// 消息&聊天功能
// ======================
function openMsgPage() {
  if (!currentUser) { alert("请先登录"); return; }
  refreshAllData();
  renderMsgList();
  document.getElementById("msgPage").style.display = "block";
}
function closeMsgPage() { document.getElementById("msgPage").style.display = "none"; }

function renderMsgList() {
  let chats = getChats();
  let chatUsers = new Set();
  chats.forEach(c => {
    if (c.from === currentUser) chatUsers.add(c.to);
    if (c.to === currentUser) chatUsers.add(c.from);
  });
  getUsers().forEach(u => {
    if (u.user !== currentUser) chatUsers.add(u.user);
  });
  let html = "";
  chatUsers.forEach(u => {
    let last = chats.filter(c =>
      (c.from === currentUser && c.to === u) || (c.from === u && c.to === currentUser)
    ).pop();
    let text = last ? last.msg : "暂无消息";
    html += `
      <div class="msg-item" onclick="openChatPage('${u}')">
        <div class="msg-avatar"><img src="https://via.placeholder.com/48"></div>
        <div class="msg-info">
          <div class="msg-name">${u}</div>
          <div class="msg-last">${text}</div>
        </div>
      </div>
    `;
  });
  document.getElementById("msgList").innerHTML = html || "<p style='text-align:center;color:#999;padding:20px'>暂无联系人</p>";
}

function openChatPage(target) {
  currentChatTarget = target;
  document.getElementById("chatTargetName").textContent = target;
  renderChat();
  document.getElementById("chatPage").style.display = "block";
  closeMsgPage();
}
function closeChatPage() {
  document.getElementById("chatPage").style.display = "none";
  currentChatTarget = null;
  openMsgPage();
}

function renderChat() {
  if (!currentChatTarget) return;
  let chats = getChats();
  let list = chats.filter(c =>
    (c.from === currentUser && c.to === currentChatTarget) ||
    (c.from === currentChatTarget && c.to === currentUser)
  );
  let html = "";
  list.forEach(c => {
    let isMe = c.from === currentUser;
    html += `
      <div class="chat-item ${isMe ? 'me' : 'other'}">
        <div class="chat-bubble">${c.msg}</div>
      </div>
    `;
  });
  document.getElementById("chatList").innerHTML = html;
  setTimeout(() => {
    document.getElementById("chatList").scrollTop = 99999;
  }, 100);
}

function sendChatMsg() {
  if (!currentUser || !currentChatTarget) return;
  let txt = document.getElementById("chatInput").value.trim();
  if (!txt) return;
  let chats = getChats();
  chats.push({ from: currentUser, to: currentChatTarget, msg: txt, time: new Date().toLocaleString() });
  saveChats(chats);
  document.getElementById("chatInput").value = "";
  renderChat();
  renderMsgList();
}

// ======================
// 页面切换
// ======================
function switchTab(t) {
  document.querySelectorAll(".tab-item").forEach(i => i.classList.remove("active"));
  document.getElementById("videoPage").classList.add("hidden");
  document.getElementById("myPage").style.display = "none";
  document.getElementById("userPage").style.display = "none";
  document.getElementById("msgPage").style.display = "none";
  document.getElementById("chatPage").style.display = "none";

  if (t === 'home') {
    document.getElementById("tabHome").classList.add("active");
    document.getElementById("videoPage").classList.remove("hidden");
  } else if (t === 'my') {
    document.getElementById("tabMy").classList.add("active");
    document.getElementById("myPage").style.display = "block";
  } else if (t === 'msg') {
    document.getElementById("tabMsg").classList.add("active");
    openMsgPage();
  }
}

// ======================
function openOtherUserPage() { if (currentUserName) openUserPage(currentUserName); }
function openUserPage(name) {
  refreshAllData();
  document.getElementById("targetName").textContent = name;
  let uw = works.filter(w => w.user == name);
  let total = 0;
  uw.forEach(w => {
    let idx = works.findIndex(x => x.url == w.url);
    total += getLikes().filter(x => x.wid == idx).length;
  });
  document.getElementById("userStat").innerText = `作品：${uw.length} 获赞：${total}`;
  document.getElementById("targetWork").innerHTML = uw.map(x => `
    <div class="user-work-item"><video src="${x.url}" onclick="jumpToWork('${x.url}')"></video></div>
  `).join("");
  document.getElementById("userPage").style.display = "block";
}
function jumpToWork(url) {
  let idx = works.findIndex(x => x.url == url);
  if (idx !== -1) { currentWorkIndex = idx; loadCurrent(); }
  closeUserPage(); switchTab('home');
}
function closeUserPage() { document.getElementById("userPage").style.display = "none"; }

function uploadVideo(e) {
  let f = e.target.files[0];
  if (!f || !currentUser) {
    alert("请先登录才能上传视频！");
    return;
  }
  let r = new FileReader();
  let wrap = document.getElementById("uploadProgress");
  let bar = document.getElementById("uploadBar");
  wrap.style.display = "block";
  
  let progress = 0;
  let interval = setInterval(() => {
    progress += 10;
    bar.style.width = `${progress}%`;
    if (progress >= 100) {
      clearInterval(interval);
    }
  }, 200);

  r.onload = ev => {
    refreshAllData();
    works.unshift({ url: ev.target.result, user: currentUser, time: new Date().toLocaleString() });
    saveWorks(works);
    currentWorkIndex = 0;
    loadCurrent();
    wrap.style.display = "none";
    bar.style.width = "0%";
    alert("视频上传成功！");
  };
  r.readAsDataURL(f);
}

function toggleFollow() {
  let b = document.getElementById("followBtn");
  b.textContent = b.textContent === "关注" ? "已关注" : "关注";
  b.classList.toggle("followed");
