<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>离门团队视频</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff;overflow:hidden}
.page{position:fixed;top:0;left:0;width:100%;height:100%;display:none}
.page.show{display:block}

/* 快手底部导航 */
.nav{position:fixed;bottom:0;left:0;width:100%;height:55px;background:#000;display:flex;align-items:center;justify-content:space-around;border-top:1px solid #222;z-index:999}
.nav .item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12px;color:#888}
.nav .item.active{color:#fff}
.nav .add{width:50px;height:50px;border-radius:50%;background:#ff4500;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin-top:-15px}

/* 我的主页（快手风格） */
.profile-page{height:100%;overflow:auto;padding-bottom:70px;background:#000}
.profile-header{padding:20px;display:flex;align-items:center;gap:15px;border-bottom:1px solid #222}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:bold}
.profile-info{flex:1}
.profile-username{font-size:20px;font-weight:bold;margin-bottom:8px}
.profile-stats{display:flex;gap:20px}
.profile-stat{display:flex;flex-direction:column;align-items:center}
.profile-stat-num{font-size:18px;font-weight:bold}
.profile-stat-text{font-size:12px;color:#888}
.profile-btns{display:flex;gap:10px;margin-top:15px}
.profile-btn{padding:8px 20px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;font-size:14px}
.profile-btn.primary{background:#ff4500;border:none}

/* 作品列表（快手瀑布流） */
.profile-videos{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.profile-video-item{aspect-ratio:9/16;background:#1a1a1a;position:relative;overflow:hidden}
.profile-video-item video{width:100%;height:100%;object-fit:cover}
.profile-video-count{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.7);padding:2px 6px;border-radius:4px;font-size:12px}

/* 登录页 */
.login-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px;height:100%}
.login-box input{width:85%;padding:12px;border-radius:8px;background:#111;border:1px solid #333;color:#fff}
.login-box button{width:85%;padding:12px;border-radius:8px;background:#ff4500;color:#fff;border:0}

/* 通用样式 */
.video-box{width:100%;height:100%;background:#000;overflow:auto;padding-bottom:70px}
video{width:100%;height:auto;display:block}
.item{border:1px solid #222;padding:10px;margin:10px 0;border-radius:8px}
.comment{background:#111;padding:8px;margin:4px 0;border-radius:6px}
input,button{width:100%;margin:6px 0;padding:10px;border-radius:8px}
input{background:#111;border:1px solid #333;color:#fff}
button{background:#ff4500;color:#fff;border:0}
</style>
</head>
<body>

<!-- 登录页（直接显示，无加载） -->
<div class="page show" id="loginPage">
  <div class="login-box">
    <h2>离门团队视频</h2>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
    <button onclick="reg()">注册</button>
    <button onclick="go('adminPage')">管理员后台</button>
  </div>
</div>

<!-- 首页（快手） -->
<div class="page" id="homePage">
  <div class="video-box" id="videoList"></div>
  <div class="nav">
    <div class="item active" onclick="go('homePage')">
      <div>🏠</div>
      <div>首页</div>
    </div>
    <div class="item" onclick="go('msgPage')">
      <div>💬</div>
      <div>消息</div>
    </div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">
      <div>👤</div>
      <div>我</div>
    </div>
  </div>
</div>

<!-- 消息页 -->
<div class="page" id="msgPage">
  <div class="video-box">
    <h3>私信</h3>
    <input id="toUser" placeholder="发给谁">
    <input id="msgText" placeholder="消息内容">
    <button onclick="sendMsg()">发送私信</button>
    <div id="msgList"></div>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item active" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<!-- 发布页 -->
<div class="page" id="uploadPage">
  <div class="video-box">
    <h3>发布视频</h3>
    <input type="file" id="vfile" accept="video/*">
    <input id="vtitle" placeholder="视频说明">
    <button onclick="upload()">发布</button>
    <button onclick="go('homePage')">返回首页</button>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add active" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<!-- 我的页（快手风格优化版） -->
<div class="page" id="mePage">
  <div class="profile-page">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">U</div>
      <div class="profile-info">
        <div class="profile-username" id="profileUsername">用户名</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat-num" id="statVideos">0</span>
            <span class="profile-stat-text">作品</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-num" id="statFollow">0</span>
            <span class="profile-stat-text">关注</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-num" id="statFans">0</span>
            <span class="profile-stat-text">粉丝</span>
          </div>
        </div>
        <div class="profile-btns">
          <button class="profile-btn primary" onclick="go('appealPage')">账号申诉</button>
          <button class="profile-btn" onclick="logout()">退出登录</button>
        </div>
      </div>
    </div>
    <div class="profile-videos" id="myVideos"></div>
  </div>
  <div class="nav">
    <div class="nav-item" onclick="go('homePage')">
      <div>🏠</div>
      <div>首页</div>
    </div>
    <div class="nav-item" onclick="go('msgPage')">
      <div>💬</div>
      <div>消息</div>
    </div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="nav-item active" onclick="go('mePage')">
      <div>👤</div>
      <div>我</div>
    </div>
  </div>
</div>

<!-- 申诉页 -->
<div class="page" id="appealPage">
  <div class="video-box">
    <h3>申诉</h3>
    <input id="appealText" placeholder="申诉理由">
    <button onclick="sendAppeal()">提交申诉</button>
    <button onclick="go('mePage')">返回</button>
  </div>
</div>

<!-- 管理员页 -->
<div class="page" id="adminPage">
  <div class="video-box">
    <h3>管理员后台</h3>
    <input id="adminPwd" type="password" placeholder="密码">
    <button onclick="adminLogin()">登录后台</button>
    <input id="banUid" placeholder="封禁UID">
    <button onclick="banUser()">封禁</button>
    <input id="unbanUid" placeholder="解封UID">
    <button onclick="unbanUser()">解封</button>
    <button onclick="showReports()">查看举报</button>
    <button onclick="showAppeals()">查看申诉</button>
    <button onclick="go('loginPage')">返回</button>
    <div id="reportList"></div>
    <div id="appealList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient("https://melgyktzmzyednqtmqfz.supabase.co","sb_publishable_iS4ChZxw5ixbg7S-y-Vddw_YQZ6SHMV");
let user = null;
const ADMIN_PWD = "1234567890";

function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  if(id==='homePage')loadVideos();
  if(id==='mePage')loadMe();
  if(id==='msgPage')loadMsgs();
}

// 登录
async function login(){
  let u=document.getElementById('user').value,p=document.getElementById('pwd').value;
  if(!u||!p)return alert('请输入账号密码');
  let {data}=await sb.from('users').select().eq('username',u).eq('password',p);
  if(data.length){user=data[0];alert('登录成功');go('homePage');}
  else alert('账号或密码错误');
}

// 注册
async function reg(){
  let u=document.getElementById('user').value,p=document.getElementById('pwd').value;
  if(!u||!p)return alert('请输入账号密码');
  let {data}=await sb.from('users').select().eq('username',u);
  if(data.length)return alert('账号已存在');
  await sb.from('users').insert([{username:u,password:p,status:'正常'}]);
  alert('注册成功！请登录');
}

// 退出
function logout(){user=null;go('loginPage');}

// 发视频
async function upload(){
  if(!user)return alert('请先登录');
  let f=document.getElementById('vfile').files[0],t=document.getElementById('vtitle').value;
  if(!f)return alert('请选视频');
  let url=URL.createObjectURL(f);
  await sb.from('videos').insert([{user_id:user.id,title:t,url:url,likes:0}]);
  alert('发布成功');go('homePage');
}

// 刷视频
async function loadVideos(){
  let {data}=await sb.from('videos').select('*,users(username)').order('id',{ascending:false});
  let box=document.getElementById('videoList');box.innerHTML='';
  data.forEach(v=>{
    let d=document.createElement('div');
    d.className='item';
    d.innerHTML=`
      <video src="${v.url}" controls></video>
      <p>@${v.users.username}</p>
      <p>${v.title}</p>
      <p>点赞：${v.likes}</p>
      <button onclick="like(${v.id})">点赞</button>
      <button onclick="report(${v.id})">举报</button>
      <input placeholder="评论" id="c${v.id}">
      <button onclick="sendComment(${v.id})">发评论</button>
      <div id="clist${v.id}"></div>
    `;
    box.appendChild(d);
    loadComment(v.id);
  });
}

// 点赞
async function like(id){
  let {data}=await sb.from('videos').select('likes').eq('id',id).single();
  await sb.from('videos').update({likes:(data.likes||0)+1}).eq('id',id);
  loadVideos();
}

// 举报
async function report(vid){
  if(!user)return alert('请登录');
  await sb.from('reports').insert([{video_id:vid,user_id:user.id,content:'违规'}]);
  alert('举报成功');
}

// 评论
async function sendComment(vid){
  if(!user)return;
  let t=document.getElementById('c'+vid).value;
  if(!t)return;
  await sb.from('comments').insert([{video_id:vid,user_id:user.id,content:t}]);
  document.getElementById('c'+vid).value='';
  loadComment(vid);
}

async function loadComment(vid){
  let {data}=await sb.from('comments').select('*,users(username)').eq('video_id',vid);
  let b=document.getElementById('clist'+vid);b.innerHTML='';
  data.forEach(c=>{
    let d=document.createElement('div');
    d.className='comment';
    d.innerText='@'+c.users.username+'：'+c.content;
    b.appendChild(d);
  });
}

// 我的视频（快手瀑布流）
async function loadMe(){
  if(!user)return;
  // 填充头像和昵称
  document.getElementById('profileUsername').innerText=user.username;
  document.getElementById('profileAvatar').innerText=user.username.charAt(0).toUpperCase();
  
  // 加载作品数
  let {data:videos}=await sb.from('videos').select('id').eq('user_id',user.id);
  document.getElementById('statVideos').innerText=videos.length;
  
  // 瀑布流展示作品
  let box=document.getElementById('myVideos');box.innerHTML='';
  videos.forEach(async (v,idx)=>{
    let {data:videoDetail}=await sb.from('videos').select('url').eq('id',v.id).single();
    let d=document.createElement('div');
    d.className='profile-video-item';
    d.innerHTML=`
      <video src="${videoDetail.url}" muted></video>
      <div class="profile-video-count">${idx+1}</div>
    `;
    box.appendChild(d);
  });
  
  // 关注/粉丝数（模拟，可后续对接真实数据）
  document.getElementById('statFollow').innerText='0';
  document.getElementById('statFans').innerText='0';
}

// 私信
async function sendMsg(){
  if(!user)return;
  let to=document.getElementById('toUser').value,t=document.getElementById('msgText').value;
  if(!to||!t)return;
  await sb.from('messages').insert([{from_uid:user.id,to_user:to,content:t}]);
  alert('发送成功');document.getElementById('msgText').value='';
}

async function loadMsgs(){
  if(!user)return;
  let {data}=await sb.from('messages').select().eq('to_user',user.username);
  let l=document.getElementById('msgList');l.innerHTML='';
  data.forEach(m=>{
    let d=document.createElement('div');
    d.className='comment';
    d.innerText=m.from_uid+'：'+m.content;
    l.appendChild(d);
  });
}

// 申诉
async function sendAppeal(){
  if(!user)return;
  let t=document.getElementById('appealText').value;
  if(!t)return;
  await sb.from('appeals').insert([{uid:user.id,reason:t}]);
  alert('申诉提交成功');go('mePage');
}

// 管理员
function adminLogin(){
  if(document.getElementById('adminPwd').value===ADMIN_PWD)alert('管理员登录成功');
  else alert('密码错误');
}

async function banUser(){
  let uid=document.getElementById('banUid').value;
  await sb.from('users').update({status:'封禁'}).eq('id',uid);
  alert('已封禁');
}

async function unbanUser(){
  let uid=document.getElementById('unbanUid').value;
  await sb.from('users').update({status:'正常'}).eq('id',uid);
  alert('已解封');
}

async function showReports(){
  let {data}=await sb.from('reports').select();
  document.getElementById('reportList').innerText=JSON.stringify(data);
}

async function showAppeals(){
  let {data}=await sb.from('appeals').select();
  document.getElementById('appealList').innerText=JSON.stringify(data);
}
</script>
</body>
</html>
