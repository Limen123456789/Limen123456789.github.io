<!DOCTYPE html>
<html lang="utf-8">
<head>
<meta charset="UTF-8">
<title>离门服务器版</title>
<style>
  body{background:#000;color:#fff}
  input{width:200px;padding:10px;margin:5px}
  button{padding:10px 20px;background:#070;color:#fff;border:0}
</style>
</head>
<body>

<h3>离门团队视频（纯服务器版）</h3>
账号：<input id="u"><br>
密码：<input id="p" type="password"><br>
<button onclick="zhuCe()">注册</button>
<button onclick="dengLu()">登录</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 你的真实服务器 + 真实密钥（把下面换成你复制的）
const sb = supabase.createClient(
  "https://melgyktzmzyednqtmqfz.supabase.co",
  "YOUR_REAL_KEY"
);

// 注册
async function zhuCe() {
  let username = document.getElementById("u").value.trim()
  let password = document.getElementById("p").value.trim()

  alert("开始注册...")

  if (!username || !password) {
    alert("账号密码不能为空")
    return
  }

  let { data, error } = await sb.from("users").insert([{ username, password }])

  if (error) {
    alert("注册失败：" + error.message)
  } else {
    alert("注册成功！")
  }
}

// 登录
async function dengLu() {
  let username = document.getElementById("u").value.trim()
  let password = document.getElementById("p").value.trim()

  alert("开始登录...")

  let { data } = await sb.from("users")
    .select()
    .eq("username", username)
    .eq("password", password)

  if (data.length > 0) {
    alert("登录成功！")
  } else {
    alert("账号或密码错误")
  }
}
</script>

</body>
</html>
