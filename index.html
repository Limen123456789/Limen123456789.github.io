<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>离门团队视频</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
  body{background:#fff;color:#000}
  .box{padding:30px;text-align:center}
  input{width:80%;padding:12px;margin:8px;border:1px solid #000;border-radius:6px}
  button{padding:12px 25px;margin:6px;background:#007aff;color:#fff;border:0;border-radius:6px;width:80%}
  .page{display:none}
  .show{display:block}
</style>
</head>
<body>

<!-- 登录注册页（默认直接显示，无加载） -->
<div class="page show" id="loginPage">
  <div class="box">
    <h2>离门团队视频</h2>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
    <button onclick="register()">注册</button>
  </div>
</div>

<!-- 首页 -->
<div class="page" id="homePage">
  <div class="box">
    <h3>首页</h3>
    <button onclick="goPage('loginPage')">退出登录</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  "https://melgyktzmzyednqtmqfz.supabase.co",
  "sb_publishable_iS4ChZxw5ixbg7S-y-Vddw_YQZ6SHMV"
);

function goPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}

async function login() {
  let u = document.getElementById('user').value
  let p = document.getElementById('pwd').value
  if(!u||!p)return alert('请输入账号密码')
  
  let {data} = await sb.from('users').select().eq('username',u).eq('password',p)
  if(data.length>0){
    alert('登录成功')
    goPage('homePage')
  }else{
    alert('账号或密码错误')
  }
}

async function register() {
  let u = document.getElementById('user').value
  let p = document.getElementById('pwd').value
  if(!u||!p)return alert('请输入账号密码')
  
  let {data} = await sb.from('users').select().eq('username',u)
  if(data.length>0)return alert('账号已存在')
  
  await sb.from('users').insert([{username:u,password:p}])
  alert('注册成功！请登录')
}
</script>
</body>
</html>
