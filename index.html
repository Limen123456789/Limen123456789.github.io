<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机风控系统</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
        body{background:#111;color:#fff;padding:10px}
        .title{text-align:center;font-size:20px;margin:10px 0;color:#0f0}
        .btn{background:#222;color:#0f0;border:1px solid #0f0;padding:12px;margin:6px;width:100%;border-radius:6px;font-size:16px}
        .btn:active{background:#030}
        .log{background:#000;color:#0f0;padding:10px;height:320px;overflow-y:auto;border:1px solid #0f0;border-radius:6px;margin-top:10px}
        input{width:100%;padding:10px;margin:6px 0;background:#222;color:#0f0;border:1px solid #0f0;border-radius:6px}
    </style>
</head>
<body>
    <div class="title">手机版 · 终极风控系统</div>

    <button class="btn" onclick="addUsers()">创建20个用户</button>
    <button class="btn" onclick="addAdminDark()">创建管理员+违规号</button>
    <button class="btn" onclick="startBadMsg()">启动自动违规发言</button>
    <button class="btn" onclick="showReport()">用户举报</button>
    <button class="btn" onclick="aiDeal()">AI自动处理举报</button>

    <div id="log" class="log"></div>

    <script>
        let users = {};
        let reports = [];
        let darkRun = false;

        function log(txt){
            let l = document.getElementById("log");
            l.innerHTML += txt + "\n";
            l.scrollTop = l.scrollHeight;
        }

        function addUsers(){
            for(let i=1;i<=20;i++){
                let id = ""+i;
                if(!users[id]) users[id] = {name:"用户"+id, ban:false, money:0};
            }
            log("✅ 已创建20个账号");
        }

        function addAdminDark(){
            for(let i=9001;i<=9010;i++){
                let id = ""+i;
                if(!users[id]) users[id] = {name:"管理员"+id, ban:false, money:0};
            }
            for(let i=10000;i<=10099;i++){
                let id = ""+i;
                if(!users[id]) users[id] = {name:"违规号"+id, ban:false, money:0};
            }
            log("✅ 管理员+违规账号已创建");
        }

        const badMsgs = ["色情加我","赌博下注","刷单赚钱","约炮","毒品","枪支"];
        function startBadMsg(){
            if(darkRun) return;
            darkRun = true;
            log("🚨 自动违规已启动");
            setInterval(()=>{
                let list = Object.keys(users).filter(k=>users[k].name.includes("违规号")&&!users[k].ban);
                if(list.length===0) return;
                let uid = list[Math.floor(Math.random()*list.length)];
                let msg = badMsgs[Math.floor(Math.random()*badMsgs.length)];
                log("["+users[uid].name+"] 发送："+msg);
                users[uid].ban = true;
                log("⛔ 已封禁："+users[uid].name);
            },1500);
        }

        function showReport(){
            let me = prompt("你的ID：");
            let tar = prompt("被举报ID：");
            let r = prompt("原因：1色情 2赌博 3辱骂");
            if(!me||!tar) return;
            if(!users[me]||!users[tar]){
                alert("用户不存在");
                return;
            }
            reports.push({me,tar,r});
            log("✅ 举报提交："+me+" → "+tar);
        }

        function aiDeal(){
            if(reports.length===0){
                log("暂无举报");
                return;
            }
            let c = 0;
            reports.forEach(r=>{
                if(users[r.tar]){
                    users[r.tar].ban = true;
                    c++;
                }
            });
            reports = [];
            log("🤖 AI处理完成，封禁"+c+"人");
        }
    </script>
</body>
</html>
