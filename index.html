<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>离门团队视频</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff;overflow:hidden}
.page{position:fixed;top:0;left:0;width:100%;height:100%;display:none}
.page.show{display:block}

/* 快手底部导航 */
.nav{position:fixed;bottom:0;left:0;width:100%;height:55px;background:#000;display:flex;align-items:center;justify-content:space-around;border-top:1px solid #222;z-index:999}
.nav .item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12px;color:#888}
.nav .item.active{color:#fff}
.nav .add{width:50px;height:50px;border-radius:50%;background:#ff4500;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin-top:-15px}

/* 我的主页（快手风格，修复头像空白） */
.profile-page{height:100%;overflow:auto;padding-bottom:70px;background:#000}
.profile-header{padding:20px;display:flex;align-items:center;gap:15px;border-bottom:1px solid #222}
.profile-avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:32px;
  font-weight:bold;
  overflow:hidden;
  position:relative
}
.profile-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block
}
.profile-avatar .placeholder{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:#fff
}
.profile-info{flex:1}
.profile-username{font-size:20px;font-weight:bold;margin-bottom:8px}
.profile-stats{display:flex;gap:20px;margin-bottom:15px}
.profile-stat{display:flex;flex-direction:column;align-items:center}
.profile-stat-num{font-size:18px;font-weight:bold}
.profile-stat-text{font-size:12px;color:#888}
.profile-btns{display:flex;flex-direction:column;gap:10px}
.profile-btn{padding:15px 20px;border-radius:8px;font-size:18px;border:none;width:100%}
.profile-btn.primary{background:#ff4500;color:#fff}
.profile-btn.secondary{background:#1a1a1a;color:#fff;border:1px solid #333}
#appealBtn{display:none}

/* 作品列表 */
.profile-videos{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;min-height:200px}
.profile-video-item{aspect-ratio:9/16;background:#1a1a1a;position:relative;overflow:hidden}
.profile-video-item video{width:100%;height:100%;object-fit:cover}
.empty-state{padding:50px;text-align:center;color:#888;font-size:16px}

/* 登录页 */
.login-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px;height:100%}
.login-box input{width:85%;padding:12px;border-radius:8px;background:#111;border:1px solid #333;color:#fff}
.login-box button{width:85%;padding:12px;border-radius:8px;background:#ff4500;color:#fff;border:0}

/* 通用样式 */
.video-box{width:100%;height:100%;background:#000;overflow:auto;padding-bottom:70px}
video{width:100%;height:auto;display:block}
.item{border:1px solid #222;padding:10px;margin:10px 0;border-radius:8px}
.comment{background:#111;padding:8px;margin:4px 0;border-radius:6px}
input,button,input[type="file"]{width:100%;margin:6px 0;padding:10px;border-radius:8px}
input{background:#111;border:1px solid #333;color:#fff}
button{background:#ff4500;color:#fff;border:0}
input[type="file"]{color:#fff;display:block;background:#1a1a1a;border:1px solid #333}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="page show" id="loginPage">
  <div class="login-box">
    <h2>离门团队视频</h2>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
    <button onclick="reg()">注册</button>
    <button onclick="go('adminPage')">管理员后台</button>
  </div>
</div>

<!-- 首页 -->
<div class="page" id="homePage">
  <div class="video-box" id="videoList">
    <div class="empty-state">暂无作品，快去发布第一条吧~</div>
  </div>
  <div class="nav">
    <div class="item active" onclick="go('homePage')">
      <div>🏠</div>
      <div>首页</div>
    </div>
    <div class="item" onclick="go('msgPage')">
      <div>💬</div>
      <div>消息</div>
    </div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">
      <div>👤</div>
      <div>我</div>
    </div>
  </div>
</div>

<!-- 消息页 -->
<div class="page" id="msgPage">
  <div class="video-box">
    <h3>私信</h3>
    <input id="toUser" placeholder="输入对方账号">
    <input id="msgText" placeholder="输入消息内容">
    <button onclick="sendMsg()">发送私信</button>
    <div id="msgList"></div>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item active" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<!-- 发布页（修复：完整视频选择+正确uuid格式） -->
<div class="page" id="uploadPage">
  <div class="video-box">
    <h3>发布视频</h3>
    <input type="file" id="vfile" accept="video/*" placeholder="选择视频文件">
    <input id="vtitle" placeholder="输入视频描述">
    <button onclick="upload()">发布作品</button>
    <button onclick="go('homePage')">返回首页</button>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add active" onclick="go('uploadPage')">+</div>
    <div class="item" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<!-- 我的页 -->
<div class="page" id="mePage">
  <div class="profile-page">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">
        <div class="placeholder" id="avatarPlaceholder">U</div>
        <img id="avatarImg" style="display:none">
      </div>
      <div class="profile-info">
        <div class="profile-username" id="profileUsername">用户名</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat-num" id="statVideos">0</span>
            <span class="profile-stat-text">作品</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-num" id="statFollow">0</span>
            <span class="profile-stat-text">关注</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-num" id="statFans">0</span>
            <span class="profile-stat-text">粉丝</span>
          </div>
        </div>
        <div class="profile-btns">
          <input type="file" id="avatarFile" accept="image/*">
          <button class="profile-btn primary" onclick="document.getElementById('avatarFile').click()">上传头像</button>
          <button class="profile-btn primary" id="appealBtn" onclick="go('appealPage')">账号申诉</button>
          <button class="profile-btn secondary" onclick="logout()">退出登录</button>
        </div>
      </div>
    </div>
    <div class="profile-videos" id="myVideos">
      <div class="empty-state">你还没有发布过作品~</div>
    </div>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">
      <div>🏠</div>
      <div>首页</div>
    </div>
    <div class="item" onclick="go('msgPage')">
      <div>💬</div>
      <div>消息</div>
    </div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item active" onclick="go('mePage')">
      <div>👤</div>
      <div>我</div>
    </div>
  </div>
</div>

<!-- 申诉页 -->
<div class="page" id="appealPage">
  <div class="video-box">
    <h3>账号申诉</h3>
    <input id="appealText" placeholder="输入申诉理由">
    <button onclick="sendAppeal()">提交申诉</button>
    <button onclick="go('mePage')">返回我的主页</button>
  </div>
  <div class="nav">
    <div class="item" onclick="go('homePage')">🏠<div>首页</div></div>
    <div class="item" onclick="go('msgPage')">💬<div>消息</div></div>
    <div class="add" onclick="go('uploadPage')">+</div>
    <div class="item active" onclick="go('mePage')">👤<div>我</div></div>
  </div>
</div>

<!-- 管理员页 -->
<div class="page" id="adminPage">
  <div class="video-box">
    <h3>管理员后台</h3>
    <input id="adminPwd" type="password" placeholder="管理员密码">
    <button onclick="adminLogin()">登录后台</button>
    <input id="banUid" placeholder="输入要封禁的用户ID">
    <button onclick="banUser()">封禁账号</button>
    <input id="unbanUid" placeholder="输入要解封的用户ID">
    <button onclick="unbanUser()">解封账号</button>
    <button onclick="showReports()">查看举报</button>
    <button onclick="showAppeals()">查看申诉</button>
    <button onclick="go('loginPage')">返回登录</button>
    <div id="reportList"></div>
    <div id="appealList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient("https://melgyktzmzyednqtmqfz.supabase.co","sb_publishable_iS4ChZxw5ixbg7S-y-Vddw_YQZ6SHMV");
let user = null;
const ADMIN_PWD = "1234567890";

// 页面切换
function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  if(id==='homePage')loadVideos();
  if(id==='mePage')loadMe();
  if(id==='msgPage')loadMsgs();
}

// 控制申诉按钮
function toggleAppealBtn(isBanned){
  const appealBtn = document.getElementById('appealBtn');
  appealBtn.style.display = isBanned ? 'block' : 'none';
}

// 更新头像显示
function updateAvatar(avatarUrl, username){
  const avatarImg = document.getElementById('avatarImg');
  const avatarPlaceholder = document.getElementById('avatarPlaceholder');
  
  if(avatarUrl && avatarUrl.trim() !== ''){
    avatarImg.src = avatarUrl;
    avatarImg.style.display = 'block';
    avatarPlaceholder.style.display = 'none';
  }else{
    avatarImg.style.display = 'none';
    avatarPlaceholder.style.display = 'flex';
    avatarPlaceholder.innerText = username ? username.charAt(0).toUpperCase() : 'U';
  }
}

// 登录（修复：正确获取uuid格式的user.id）
async function login(){
  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pwd').value.trim();
  if(!u || !p) return alert('请输入完整的账号和密码');

  try {
    const { data, error } = await sb
      .from('users')
      .select('*')
      .eq('username', u)
      .eq('password', p);

    if(error) throw error;
    if(data.length === 0) return alert('账号或密码错误');

    user = data[0];
    // 确保user.id是正确的uuid格式，直接使用数据库返回的id
    toggleAppealBtn(user.status === '封禁');
    updateAvatar(user.avatar, user.username);
    alert('登录成功！');
    go('homePage');
  } catch (err) {
    console.error(err);
    alert('登录失败：' + err.message);
  }
}

// 注册
async function reg(){
  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pwd').value.trim();
  if(!u || !p) return alert('请输入完整的账号和密码');
  if(u.length < 3 || p.length < 6) return alert('账号至少3位，密码至少6位');

  try {
    const { data: exist } = await sb
      .from('users')
      .select('username')
      .eq('username', u);

    if(exist.length > 0) return alert('该账号已被注册');

    const { error } = await sb
      .from('users')
      .insert([{ 
        username: u, 
        password: p, 
        status: '正常',
        avatar: ''
      }]);

    if(error) throw error;
    alert('注册成功！请返回登录');
    document.getElementById('user').value = '';
    document.getElementById('pwd').value = '';
  } catch (err) {
    console.error(err);
    alert('注册失败：' + err.message);
  }
}

// 退出登录
function logout(){
  user = null;
  document.getElementById('user').value = '';
  document.getElementById('pwd').value = '';
  toggleAppealBtn(false);
  updateAvatar('', 'U');
  go('loginPage');
}

// 上传头像
document.getElementById('avatarFile').addEventListener('change',async function(e){
  if(!user) return alert('请先登录');
  const file = e.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')) return alert('请选择图片文件');

  try {
    const reader = new FileReader();
    reader.onload = async function(event){
      const avatarUrl = event.target.result;
      
      const { error } = await sb.from('users').update({avatar:avatarUrl}).eq('id',user.id);
      if(error) throw error;
      
      user.avatar = avatarUrl;
      updateAvatar(avatarUrl, user.username);
      alert('头像上传成功！');
    };
    reader.readAsDataURL(file);
  } catch(err){
    console.error(err);
    alert('头像上传失败：' + err.message);
  }
});

// 发布作品（修复：正确传递uuid格式的user_id）
async function upload(){
  if(!user) return alert('请先登录账号');
  const fileInput = document.getElementById('vfile');
  const file = fileInput.files[0];
  const title = document.getElementById('vtitle').value.trim();

  if(!file) return alert('请选择要发布的视频文件');
  if(!title) return alert('请输入视频描述');
  if(!file.type.startsWith('video/')) return alert('请选择视频格式文件');

  try {
    const url = URL.createObjectURL(file);
    // 直接使用user.id，确保是数据库返回的正确uuid格式
    const { error } = await sb
      .from('videos')
      .insert([{
        user_id: user.id,
        title: title,
        url: url,
        likes: 0,
        created_at: new Date().toISOString()
      }]);

    if(error) throw error;
    alert('作品发布成功！');
    go('homePage');
    fileInput.value = '';
    document.getElementById('vtitle').value = '';
  } catch (err) {
    console.error(err);
    alert('发布失败：' + err.message);
  }
}

// 加载首页视频
async function loadVideos(){
  try {
    const { data, error } = await sb
      .from('videos')
      .select('*, users(username,avatar)')
      .order('created_at', { ascending: false });

    if(error) throw error;
    const box = document.getElementById('videoList');
    box.innerHTML = '';

    if(data.length === 0){
      box.innerHTML = '<div class="empty-state">暂无作品，快去发布第一条吧~</div>';
      return;
    }

    data.forEach(v=>{
      const d = document.createElement('div');
      d.className = 'item';
      const avatarHtml = v.users?.avatar ? 
        `<img src="${v.users.avatar}" style="width:100%;height:100%;object-fit:cover">` : 
        (v.users?.username ? v.users.username.charAt(0).toUpperCase() : 'U');
      
      d.innerHTML = `
        <video src="${v.url}" controls></video>
        <div style="padding:10px;display:flex;align-items:center;gap:10px">
          <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;background:#333;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px">
            ${avatarHtml}
          </div>
          <div>
            <p>@${v.users?.username || '未知用户'}</p>
            <p>${v.title}</p>
            <p>点赞：${v.likes || 0}</p>
          </div>
        </div>
        <button onclick="like(${v.id})" style="width:auto;margin:10px">点赞</button>
        <button onclick="report(${v.id})" style="width:auto;margin:10px">举报</button>
        <input placeholder="写评论..." id="c${v.id}" style="width:90%;margin:10px">
        <button onclick="sendComment(${v.id})" style="width:auto;margin:0 10px 10px">发评论</button>
        <div id="clist${v.id}" style="padding:0 10px 10px"></div>
      `;
      box.appendChild(d);
      loadComment(v.id);
    });
  } catch (err) {
    console.error(err);
    document.getElementById('videoList').innerHTML = '<div class="empty-state">暂无作品，快去发布第一条吧~</div>';
  }
}

// 点赞
async function like(id){
  try {
    const { data } = await sb
      .from('videos')
      .select('likes')
      .eq('id', id)
      .single();

    await sb
      .from('videos')
      .update({ likes: (data.likes || 0) + 1 })
      .eq('id', id);

    loadVideos();
  } catch (err) {
    console.error(err);
    alert('点赞失败');
  }
}

// 举报
async function report(vid){
  if(!user) return alert('请先登录');
  try {
    await sb
      .from('reports')
      .insert([{
        video_id: vid,
        user_id: user.id,
        content: '用户举报',
        created_at: new Date().toISOString()
      }]);
    alert('举报成功，管理员会尽快处理');
  } catch (err) {
    console.error(err);
    alert('举报失败');
  }
}

// 评论
async function sendComment(vid){
  if(!user) return alert('请先登录');
  const txt = document.getElementById(`c${vid}`).value.trim();
  if(!txt) return alert('请输入评论内容');

  try {
    await sb
      .from('comments')
      .insert([{
        video_id: vid,
        user_id: user.id,
        content: txt,
        created_at: new Date().toISOString()
      }]);

    document.getElementById(`c${vid}`).value = '';
    loadComment(vid);
  } catch (err) {
    console.error(err);
    alert('评论失败');
  }
}

async function loadComment(vid){
  try {
    const { data } = await sb
      .from('comments')
      .select('*, users(username)')
      .eq('video_id', vid)
      .order('created_at', { ascending: false });

    const box = document.getElementById(`clist${vid}`);
    box.innerHTML = '';
    data.forEach(c=>{
      const d = document.createElement('div');
      d.className = 'comment';
      d.innerText = `@${c.users?.username || '未知用户'}：${c.content}`;
      box.appendChild(d);
    });
  } catch (err) {
    console.error(err);
  }
}

// 加载我的主页
async function loadMe(){
  if(!user){
    go('loginPage');
    return;
  }

  document.getElementById('profileUsername').innerText = user.username;
  toggleAppealBtn(user.status === '封禁');
  updateAvatar(user.avatar, user.username);

  try {
    const { data: videos, error } = await sb
      .from('videos')
      .select('id')
      .eq('user_id', user.id);

    if(error) throw error;
    document.getElementById('statVideos').innerText = videos.length;

    const box = document.getElementById('myVideos');
    box.innerHTML = '';

    if(videos.length === 0){
      box.innerHTML = '<div class="empty-state">你还没有发布过作品~</div>';
    }else{
      videos.forEach(async (v)=>{
        try {
          const { data: videoDetail } = await sb
            .from('videos')
            .select('url')
            .eq('id', v.id)
            .single();

          const d = document.createElement('div');
          d.className = 'profile-video-item';
          d.innerHTML = `<video src="${videoDetail.url}" muted></video>`;
          box.appendChild(d);
        } catch (videoErr) {
          console.error(videoErr);
        }
      });
    }

    document.getElementById('statFollow').innerText = '0';
    document.getElementById('statFans').innerText = '0';
  } catch (err) {
    console.error(err);
  }
}

// 私信
async function sendMsg(){
  if(!user) return alert('请先登录');
  const to = document.getElementById('toUser').value.trim();
  const txt = document.getElementById('msgText').value.trim();
  if(!to || !txt) return alert('请输入完整内容');

  try {
    await sb
      .from('messages')
      .insert([{
        from_uid: user.id,
        to_user: to,
        content: txt,
        created_at: new Date().toISOString()
      }]);

    alert('私信发送成功');
    document.getElementById('msgText').value = '';
    loadMsgs();
  } catch (err) {
    console.error(err);
    alert('发送失败');
  }
}

async function loadMsgs(){
  if(!user) return;
  try {
    const { data } = await sb
      .from('messages')
      .select('*, users(username)')
      .eq('to_user', user.username)
      .order('created_at', { ascending: false });

    const box = document.getElementById('msgList');
    box.innerHTML = '';
    data.forEach(m=>{
      const d = document.createElement('div');
      d.className = 'comment';
      d.innerText = `来自@${m.users?.username || '未知用户'}：${m.content}`;
      box.appendChild(d);
    });
  } catch (err) {
    console.error(err);
  }
}

// 申诉
async function sendAppeal(){
  if(!user) return alert('请先登录');
  const txt = document.getElementById('appealText').value.trim();
  if(!txt) return alert('请输入申诉理由');

  try {
    await sb
      .from('appeals')
      .insert([{
        uid: user.id,
        reason: txt,
        status: '待处理',
        created_at: new Date().toISOString()
      }]);

    alert('申诉提交成功，管理员会尽快处理');
    go('mePage');
  } catch (err) {
    console.error(err);
    alert('申诉失败');
  }
}

// 管理员
function adminLogin(){
  const pwd = document.getElementById('adminPwd').value;
  if(pwd === ADMIN_PWD){
    alert('管理员登录成功');
  } else {
    alert('密码错误');

async function banUser(){
  const uid = document.getElementById('banUid').value.trim();
  if(!uid) return alert('请输入用户ID');

  try {
    await sb
      .from('users')
      .update({ status: '封禁' })
      .eq('id', uid);

    alert('账号封禁成功');
  } catch (err) {
    console.error(err);
    alert('封禁失败');
  }
}

async function unbanUser(){
  const uid = document.getElementById('unbanUid').value.trim();
  if(!uid) return alert('请输入用户ID');

  try {
    await sb
      .from('users')
      .update({ status: '正常' })
      .eq('id', uid);

    alert('账号解封成功');
  } catch (err) {
    console.error(err);
    alert('解封失败');
  }
}

async function showReports(){
  try {
    const { data } = await sb.from('reports').select();
    const box = document.getElementById('reportList');
    box.innerHTML = '<h4>举报列表</h4>';
    if(data.length === 0){
      box.innerHTML += '<div class="empty-state">暂无举报</div>';
      return;
    }
    data.forEach(r=>{
      const d = document.createElement('div');
      d.className = 'item';
      d.innerText = `举报ID：${r.id}，视频ID：${r.video_id}，用户ID：${r.user_id}`;
      box.appendChild(d);
    });
  } catch (err) {
    console.error(err);
    alert('加载举报失败');
  }
}

async function showAppeals(){
  try {
    const { data } = await sb.from('appeals').select();
    const box = document.getElementById('appealList');
    box.innerHTML = '<h4>申诉列表</h4>';
    if(data.length === 0){
      box.innerHTML += '<div class="empty-state">暂无申诉</div>';
      return;
    }
    data.forEach(a=>{
      const d = document.createElement('div');
      d.className = 'item';
      d.innerText = `申诉ID：${a.id}，用户ID：${a.uid}，理由：${a.reason}，状态：${a.status}`;
      box.appendChild(d);
    });
  } catch (err) {
    console.error(err);
    alert('加载申诉失败');
  }
}
