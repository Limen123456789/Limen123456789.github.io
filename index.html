<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>离门团队视频（服务器版）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:Arial}
  .auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
  .box{width:90%;max-width:350px;background:#111;padding:20px;border-radius:10px}
  input{width:100%;padding:12px;margin:8px 0;background:#222;border:1px solid #0f0;color:#fff;border-radius:6px}
  button{width:100%;padding:12px;margin:6px 0;background:#070;color:#fff;border:0;border-radius:6px}
  .main{display:none;padding:10px}
  .video{width:100%;height:250px;background:#000;margin:10px 0}
  .list{margin-top:20px}
  .item{background:#111;padding:10px;margin:6px 0;border-radius:6px}
</style>
</head>
<body>

<!-- 登录注册 -->
<div class="auth" id="auth">
  <div class="box">
    <h3>离门团队视频</h3>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button onclick="reg()">注册</button>
    <button onclick="login()">登录</button>
  </div>
</div>

<!-- 主界面 -->
<div class="main" id="main">
  <h3>首页（服务器视频）</h3>
  <input type="file" id="f" accept="video/*">
  <button onclick="up()">上传发布</button>
  <div class="list" id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 你的服务器
const sb = supabase.createClient(
  "https://melgyktzmzyednqtmqfz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lbGd5a3R6bXp5ZWRucXRtcWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM1NTYwMDAsImV4cCI6MjA1OTEzMjAwMH0.WOzKZnU-8qG0q-6nGJzFmXfL8aG1pG3gG1G2G3G4G5G6"
);

let me = null;

// 注册（绝对有反应）
async function reg(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if(!u||!p)return alert("不能为空");
  let {data} = await sb.from("users").select("*").eq("user",u);
  if(data.length>0)return alert("已存在");
  await sb.from("users").insert([{user:u,pwd:p}]);
  alert("注册成功");
}

// 登录（绝对有反应）
async function login(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if(!u||!p)return alert("请输入");
  let {data} = await sb.from("users").select("*").eq("user",u).eq("pwd",p);
  if(!data.length)return alert("账号或密码错误");
  me = u;
  document.getElementById("auth").style.display="none";
  document.getElementById("main").style.display="block";
  load();
}

// 上传视频（服务器）
async function up(){
  let file = document.getElementById("f").files[0];
  if(!file)return alert("选视频");
  let name = Date.now()+file.name;
  await sb.storage.from("videos").upload(name,file);
  let {data} = sb.storage.from("videos").getPublicUrl(name);
  await sb.from("videos").insert([{user:me,url:data.publicUrl}]);
  alert("发布成功");
  load();
}

// 加载所有人的视频
async function load(){
  let {data} = await sb.from("videos").select("*").order("id",{ascending:false});
  let html="";
  data.forEach(i=>{
    html+=`<div class="item">${i.user} 发布<br><video src="${i.url}" class="video" controls></video></div>`;
  });
  document.getElementById("list").innerHTML=html;
}
</script>
</body>
</html>
