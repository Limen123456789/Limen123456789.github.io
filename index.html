<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机风控系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#111;color:#0f0;padding:15px}
.title{text-align:center;font-size:22px;margin:10px 0;text-shadow:0 0 10px #0f0}
.btn{background:#222;color:#0f0;border:2px solid #0f0;padding:14px;margin:8px 0;width:100%;border-radius:6px;font-size:16px;font-weight:bold}
.btn:active{background:#040}
.log{background:#000;border:2px solid #0f0;padding:10px;height:220px;overflow:auto;margin-top:10px;font-size:14px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);justify-content:center;align-items:center}
.modal>div{background:#111;border:2px solid #0f0;padding:20px;width:90%;border-radius:10px}
input{width:100%;padding:10px;margin:8px 0;background:#222;border:1px solid #0f0;color:#0f0}
.admin{display:none;margin-top:20px;padding:15px;border:2px solid #0f0;border-radius:8px}
.logout{background:#400;border-color:#f30;color:#f30}
.video-box{margin-top:15px;padding:15px;border:2px solid #0f0;border-radius:8px}
video{width:100%;border-radius:6px;background:#000;margin-top:10px}
.upload-box{margin-top:10px}
</style>
</head>
<body>
<h1 class="title">手机版·终极风控系统</h1>

<button class="btn" id="goAdmin">管理员登录</button>
<button class="btn" onclick="createUsers()">创建20个用户</button>
<button class="btn" onclick="createAdminAndViolate()">创建管理员+违规号</button>
<button class="btn" onclick="startAutoViolate()">启动自动违规发言</button>
<button class="btn" onclick="userReport()">用户举报</button>
<button class="btn" onclick="aiHandleReport()">AI自动处理举报</button>

<div class="upload-box">
<button class="btn" onclick="document.getElementById('fileInp').click()">📤 用户上传视频</button>
<input type="file" id="fileInp" accept="video/*" style="display:none" onchange="uploadVideo(event)">
</div>

<div class="video-box">
<h3 class="title">🎬 公共视频区（全平台可见）</h3>
<video id="mainVideo" controls></video>
</div>

<div class="log" id="log"></div>

<div class="modal" id="loginModal">
<div>
<h3 class="title">管理员登录</h3>
<input id="user" placeholder="账号">
<input id="pwd" type="password" placeholder="密码">
<button class="btn" onclick="login()">登录</button>
<button class="btn" onclick="closeModal()">关闭</button>
</div>
</div>

<div class="admin" id="adminPanel">
<h3 class="title">🔐 管理员后台</h3>
<button class="btn" onclick="log('📋 管理员查看全部用户')">查看所有用户</button>
<button class="btn" onclick="log('⚠️ 查看违规记录')">查看违规记录</button>
<button class="btn" onclick="log('🔨 批量封号完成')">批量封号</button>
<button class="btn logout" onclick="logout()">退出登录</button>
</div>

<script>
let isAdmin = false;
const adminUser = "admin";
const adminPwd = "admin123456";
let globalVideoUrl = "";

function log(msg){
  const d = new Date().toLocaleTimeString();
  const el = document.getElementById("log");
  el.innerHTML += `[${d}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

document.getElementById("goAdmin").onclick = ()=>{
  document.getElementById("loginModal").style.display="flex";
}
function closeModal(){
  document.getElementById("loginModal").style.display="none";
}
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pwd").value;
  if(u===adminUser && p===adminPwd){
    isAdmin = true;
    closeModal();
    document.getElementById("adminPanel").style.display="block";
    log("✅ 管理员登录成功");
  }else{
    log("❌ 账号或密码错误");
  }
}
function logout(){
  isAdmin = false;
  document.getElementById("adminPanel").style.display="none";
  log("✅ 已退出管理员");
}

function uploadVideo(e){
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  globalVideoUrl = url;
  const v = document.getElementById("mainVideo");
  v.src = url;
  v.play();
  log("📤 视频上传成功 —— 全平台所有人都能看到！");
}

function createUsers(){log("👤 创建20个用户完成");}
function createAdminAndViolate(){log("👑 管理员+违规号创建完成");}
function startAutoViolate(){log("🚀 启动自动违规检测");}
function userReport(){log("📢 举报已提交");}
function aiHandleReport(){log("🤖 AI已处理举报");}
</script>
</body>
</html>
